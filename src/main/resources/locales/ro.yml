biomes:
  commands:
    # Această secțiune conține doar traduceri pentru comenzile de administrator.
    admin:
      main:
        description: "comanda principală de administrator pentru biome"
      import:
        parameters: "<file>"
        description: "importă biome"
        confirmation: "Aceasta va elimina biomele existente din [gamemode] și va importa biome noi din fișierul șablon - vă rog confirmați"
      migrate:
        description: "migrează datele stocate de biome în format nou"
      set:
        description: "schimbă biomul pentru jucător"
        parameters: "<player> <biome-id> [mode] [size]"
      unlock:
        description: "deblochează biomul pentru jucător fără verificări. Adăugând `true` la sfârșit va marca ca cumpărat."
        parameters: "<player> <biome-id> [true]"
      clear-queue:
        description: "șterge coada de actualizare a biomului"
    # Această secțiune conține doar traduceri pentru comenzile jucătorului.
    player:
      main:
        description: "deschide interfața de selecție a biomelor"
      set:
        description: "schimbă biomul pentru jucător"
        parameters: "<biome-id> [mode] [size]"
      buy:
        description: "cumpără biomul solicitat"
        parameters: "<biome-id>"
      info:
        description: "trimite un mesaj de chat cu descrierea detaliată a biomului"
        parameters: "<biome-id>"
  gui:
    titles:
      player-panel: "<black><bold> Alege Biomul"
      buy-panel: "<black><bold> Cumpără Biomul"
      advanced-panel: "<black><bold> Mod Actualizare"
      admin-panel: "<black><bold> Interfață Administrator"
      settings: "<black><bold> Setări"
      library: "<black><bold> Bibliotecă"
      manage-biomes: "<black><bold> Gestionează Biome"
      manage-bundles: "<black><bold> Gestionează Pachete"
      manage-islands: "<black><bold> Gestionează Date Insule"
      edit-biome: "<black><bold> Editează Biomul: [biome]"
      edit-bundle: "<black><bold> Editează Pachetul: [bundle]"
      edit-island: "<black><bold> Editează Insula: [island]"
      environment-selector: "<black><bold> Selectează Mediu"
      biome-selector: "<black><bold> Selectează Biomul"
      bundle-selector: "<black><bold> Selectează Pachetul"
      item-selector: "<black><bold> Selectează Articole"
    buttons:
      island:
        name: "<white><bold> Insula"
        description: |-
          <gray> Schimbă biomul pe toată
          <gray> insula.
      chunk:
        name: "<white><bold> Chunk"
        description: |-
          <gray> Schimbă biomul în chunckuri.
      range:
        name: "<white><bold> Rază"
        description: |-
          <gray> Schimbă biomul după rază.
      reduce:
        name: "<white><bold> Reduce"
        description: |-
          <gray> Reduce cu <yellow> [number]
      increase:
        name: "<white><bold> Mărește"
        description: |-
          <gray> Mărește cu <yellow> [number]
      accept:
        name: "<white><bold> Aplică Schimbare"
        description: |-
          <gray> Schimbă biomul în <yellow> [biome]

          <gray> Mod actualizare: <yellow> [mode]
          <gray> Rază actualizare: <yellow> [number]
      return:
        name: "<white><bold> Întoarcere"
        description: |-
          <gray> Înapoi la meniul anterior.
      previous:
        name: "<white><bold> Pagina Anterioară"
        description: |-
          <gray> Comută la pagina <yellow> [number]
      next:
        name: "<white><bold> Pagina Următoare"
        description: |-
          <gray> Comută la pagina <yellow> [number]
      quit:
        name: "<white><bold> Ieși"
        description: |-
          <gray> Ieși din interfață.
      save:
        name: "<white><bold> Salvează"
        description: |-
          <gray> Salvează modificări și întoarce-te.
      cancel:
        name: "<white><bold> Anulează"
        description: |-
          <gray> Anulează modificări și întoarce-te.
      search:
        name: "<white><bold> Caută"
        description: |-
          <gray> Permite căutarea unui
          <gray> element cu valoare de text
          <gray> de intrare.
        search: "<aqua> Valoare: [value]"
      buy:
        name: "<white><bold> Cumpără"
        description: |-
          <gray> Cumpără un nou biom.
      manage_islands:
        name: "<white><bold> Gestionează Insule"
        description: |-
          <gray> Permite gestionarea
          <gray> datelor insulei.
      manage_biomes:
        name: "<white><bold> Gestionează Biome"
        description: |-
          <gray> Permite gestionarea
          <gray> datelor biomelor.
      manage_bundles:
        name: "<white><bold> Gestionează Pachete"
        description: |-
          <gray> Permite gestionarea
          <gray> datelor pachetelor.
      settings:
        name: "<white><bold> Setări"
        description: |-
          <gray> Permite modificarea unor
          <gray> setări ale extensiei.
      import_template:
        name: "<white><bold> Importă Șablon"
        description: |-
          <gray> Importă fișier șablon
          <gray> situat în directorul
          <gray> extensiei.
      web_library:
        name: "<white><bold> Bibliotecă Web"
        description: |-
          <gray> Accesează biblioteca web
          <gray> care conține biome
          <gray> partajate.
      export_from_database:
        name: "<white><bold> Exportă Bază de Date"
        description: |-
          <gray> Exportă baza de date
          <gray> într-un singur fișier situat
          <gray> în directorul extensiei.
      import_to_database:
        name: "<white><bold> Importă Bază de Date"
        description: |-
          <gray> Importă o bază de date
          <gray> dintr-un fișier situat în
          <gray> directorul extensiei.
      wipe_islands_data:
        name: "<white><bold> Șterge Baza de Date Insule"
        description: |-
          <gray> Șterge toate datele
          <gray> biomelor utilizatorului pentru acest mod de joc.
      wipe_biomes_data:
        name: "<white><bold> Șterge Baza de Date Biome"
        description: |-
          <gray> Șterge toate datele biomelor și pachetelor
          <gray> pentru acest mod de joc.
      add_biome:
        name: "<white><bold> Adaugă Biomul"
        description: |-
          <gray> Creează un nou Biom pe care
          <gray> jucătorii pot să-l folosească
          <gray> folosind panourile utilizatorului.
      remove_biome:
        name: "<white><bold> Elimină Biomul"
        description: |-
          <gray> Elimină biomele selectate
          <gray> din panourile utilizatorului.
        title: "<yellow> Biome Selectate:"
        value: "<yellow> - [biome]"
      accept_selected:
        name: "<white><bold> Acceptă Selectate"
        description: |-
          <gray> Acceptă elementele selectate.
        title: "<yellow> Elemente Selectate:"
        element: "<yellow> - [element]"
      environment_element:
        name: "<white><bold> [environment]"
        description: |-
          <gray> [description].
      properties:
        name: "<white><bold> Proprietăți"
        description: |-
          <gray> Vizualizează proprietățile principale ale biomului.
      change_properties:
        name: "<white><bold> Schimbă Proprietăți"
        description: |-
          <gray> Vizualizează schimbarea proprietăților biomului.
      unlock_properties:
        name: "<white><bold> Deblochează Proprietăți"
        description: |-
          <gray> Vizualizează deblocharea proprietăților biomului.
      biome:
        name: "<white><bold> [biome]"
        description: |-
          <gray> Tip de biom Minecraft.
        value: "<gray> ID Biom: <yellow> [id]"
      name:
        name: "<white><bold> Nume Afișat"
        description: |-
          <gray> Nume afișat pentru biom.
          <gray> Suportă coduri de culoare.
        value: "<gray> Valoare Actuală: <reset> [name]"
      deployed:
        name: "<white><bold> Implementat"
        description: |-
          <gray> Comută dacă biomul este
          <gray> accesibil jucătorilor
          <gray> sau nu.
        enabled: "<dark_green> Activat"
        disabled: "<red> Dezactivat"
      environment:
        name: "<white><bold> Dimensiune"
        description: |-
          <gray> Permite limitarea în care
          <gray> dimensiune poate fi aplicat
          <gray> biomul.
        enabled: "<dark_green>"
        disabled: "<red>"
      icon:
        name: "<white><bold> Pictogramă"
        description: |-
          <gray> Permite schimbarea pictogramei
          <gray> pentru acest biom.
      order:
        name: "<white><bold> Ordine"
        description: |-
          <gray> Permite schimbarea ordinii
          <gray> obiectelor.
          <gray> Obiectele cu numere egale
          <gray> vor fi ordonate după
          <gray> numele lor unic.
        value: "<gray> Ordine actuală: <yellow> [number]"
      description:
        name: "<white><bold> Descriere"
        description: |-
          <gray> Descrierea specifică
          <gray> pentru biom. Codurile de culoare
          <gray> trebuie aplicate acesteia.
        value: "<yellow> Descriere actuală:"
        none: "<gray> Descrierea nu este stabilită."
      unlock_permissions:
        name: "<white><bold> Permisiuni"
        description: |-
          <gray> Permite schimbarea
          <gray> permisiunilor de deblocare pentru
          <gray> acest biom să fie accesibil.
        title: "<yellow> Permisiuni: "
        element: " <dark_gray> - [permission]"
        none: "<gray> Permisiunile nu sunt stabilite."
      unlock_cost:
        name: "<white><bold> Cost"
        description: |-
          <gray> Permite schimbarea costului
          <gray> deblochării acestui biom.
        value: "<gray> Cost actual: <yellow> [number]"
      unlock_items:
        name: "<white><bold> Articole"
        description: |-
          <gray> Permite schimbarea articolelor
          <gray> de deblocare pentru acest biom.
        title: "<yellow> Articole: "
        element: " <dark_gray> - [number]x[item]"
        none: "<gray> Articolele nu sunt stabilite."
      unlock_level:
        name: "<white><bold> Nivel"
        description: |-
          <gray> Permite schimbarea nivelului
          <gray> insulei necesar
          <gray> pentru deblocharea acestui biom.
        value: "<gray> Nivel actual: <yellow> [number]"
      change_cost:
        name: "<white><bold> Cost"
        description: |-
          <gray> Permite schimbarea costului
          <gray> aplicării acestui biom.
        value: "<gray> Cost actual: <yellow> [number]"
      change_items:
        name: "<white><bold> Articole"
        description: |-
          <gray> Permite schimbarea articolelor
          <gray> pentru aplicarea acestui biom.
        title: "<yellow> Articole: "
        element: " <dark_gray> - [number]x[item]"
        none: "<gray> Articolele nu sunt stabilite."
      change_type:
        name: "<white><bold> [type]"
        description: |-
          <gray> Permite schimbarea tipului de cost
          <gray> pentru aplicarea acestui biom.
        static:
          name: "Valoare Statică"
          description: |-
            <gray> Costul schimbării biomului nu
            <gray> se schimbă.
        per_block:
          name: "Per Bloc"
          description: |-
            <gray> Costul schimbării biomului este
            <gray> calculat pe bloc.
        per_usage:
          name: "Per Utilizare"
          description: |-
            <gray> Costul schimbării biomului
            <gray> crește după fiecare
            <gray> utilizare.
        enabled: "<dark_green>"
        disabled: "<red>"
      change_increment:
        name: "<white><bold> Increment"
        description: |-
          <gray> Permite schimbarea
          <gray> incrementului per utilizare.
        value: "<gray> Valoare actuală: <yellow> [number]"
      biome-filter:
        name: "<white><bold> [filter]"
        description: |-
          <gray> Filtru Biom bazat
          <gray> pe Wiki-ul Minecraft.
        lush: "Biome Luxuriante"
        dry: "Biome Uscate"
        cold: "Biome Reci"
        snowy: "Biome Ninsate"
        aquatic: "Biome Oceanice"
        nether: "Biome Nether"
        the_end: "Biome The End"
        neutral: "Biome Neutre"
        unused: "Biome Nefolosite"
        warm: "Biome Calde"
        cave: "Biome Peșteri"
        temperate: "Biome Temperate"
      protection_range:
        name: "<white><bold> Rază Protecție"
        description: |-
          <gray> Permite limitarea schimbării
          <gray> biomului doar la raza de
          <gray> protecție a insulei în loc de
          <gray> schimbarea biomului pe toată insula.
        enabled: "<dark_green> Activată"
        disabled: "<red> Dezactivată"
      reset:
        name: "<white><bold> Resetare la Schimbarea Proprietarului"
        description: |-
          <gray> Permite activarea forțării
          <gray> schimbării biomului la cel implicit,
          <gray> dacă insula se schimbă din proprietar
          <gray> și noul proprietar nu are
          <gray> permisiunea biomului curent.
        enabled: "<dark_green> Activată"
        disabled: "<red> Dezactivată"
      cool_down:
        name: "<white><bold> Răgaz Biom"
        description: |-
          <gray> Permite stabilirea numărului
          <gray> de secunde între moment când
          <gray> jucătorul poate schimba biomul din nou.
        value: "<gray> Răgaz actual: <yellow> [number]"
        disabled: "<yellow> Răgazul este dezactivat."
      default_size:
        name: "<white><bold> Rază Implicită"
        description: |-
          <gray> Permite stabilirea numărului care
          <gray> va fi folosit când jucătorul
          <gray> schimbă biomul fără a-l
          <gray> specifica.
        value: "<gray> Rază Implicită: <yellow> [number]"
      default_mode:
        name: "<white><bold> Mod Actualizare Implicit"
        description: |-
          <gray> Permite stabilirea modului implicit
          <gray> de actualizare când jucătorii nu
          <gray> l-au furnizat.
        enabled: "<dark_green>"
        disabled: "<red>"
      unlock_notify:
        name: "<white><bold> Notificare la Deblocare"
        description: |-
          <gray> Un mesaj va fi trimis
          <gray> utilizatorului când deblochează
          <gray> un nou biom.
        enabled: |-
          <aqua> Notificarea la deblocare este <green> activată <aqua>.
        disabled: |-
          <aqua> Notificarea la deblocare este <red> dezactivată <aqua>.
      change_timeout:
        name: "<white><bold> Timeout Pentru Schimbare"
        description: |-
          <gray> Permite stabilirea după câte
          <gray> minute actualizarea biomului
          <gray> va fi terminată.
          <gray> Poate să se întâmple pe insule
          <gray> foarte mari sau servere sub
          <gray> încarcare imensă.
        value: "<gray> Timeout după: <yellow> [number] min"
      parallel_updates:
        name: "<white><bold> Actualizări Paralele"
        description: |-
          <gray> Permite stabilirea câte actualizări
          <gray> de biom pot să se întâmple în
          <gray> același timp.
          <gray> Celelalte vor fi plasate în
          <gray> coadă.
        value: |-
          <gray> Valoare actuală: <yellow>[number]<gray>.
      use_bank:
        name: "<white><bold> Folosește Cont Bancar"
        description: |-
          <gray> Comută dacă toate plățile
          <gray> făcute de extensia Biomes vor
          <gray> folosi Contul Bancar al Insulei
          <gray> din Extensia Bank.
        enabled: |-
          <aqua> Utilizarea Contului Bancar este <green> activată <aqua>.
        disabled: |-
          <aqua> Utilizarea Contului Bancar este <red> dezactivată <aqua>.
        missing: |-
          <red> Extensia Bank nu este instalată.
      visibility:
        name: "<white><bold> Vizibilitate Biom"

      bundle_biomes:
        name: "<white><bold> Gestionează Biome"
        description: |-
          <gray> Gestionează biomele care sunt
          <gray> atribuite pachetului.
      bundle_name:
        name: "<white><bold> Schimbă Nume"
        description: |-
          <gray> Schimbă numele afișat

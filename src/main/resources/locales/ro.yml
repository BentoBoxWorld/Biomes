        title: "<aqua> Biome Selectate:"
        value: "<aqua> - [biome]"
      create_bundle:
        name: "<white><bold> Creează Pachet"
        description: |-
          <gray> Creează un nou pachet
          <gray> pentru acest mod de joc.
      delete_bundle:
        name: "<white><bold> Elimină Pachetul"
        description: |-
          <gray> Elimină un pachet din

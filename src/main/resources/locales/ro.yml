          <gray> Doar biomele din acest
          <gray> pachet pot fi folosite pe insulă.
          <gray> Permisiune pentru utilizator pentru atribuire:
          <gray><italic> '[gamemode].biomes.
          <gray><italic> bundle.<bundle-id>'
        value: "<aqua> Pachet: [bundle]"
      reset_to_default:
        name: "<white><bold> Resetare la Implicit"
        description: |-
          <gray> Resetează toate valorile

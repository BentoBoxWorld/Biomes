        title: "<gray> Membri Insulei:"
        element: " <gray> - <yellow> [player]"
      change_biome:
        name: "<white><bold> Schimbă Biomul"
        description: |-
          <gray> Schimbă biomul per insulă.
      manage_data:
        name: "<white><bold> Gestionează Datele Insulei"
        description: |-
          <gray> Gestionează datele care sunt

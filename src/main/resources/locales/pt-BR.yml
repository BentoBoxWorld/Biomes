      click-to-edit: "<yellow> Clique <gray> para editar."
      left-click-to-download: "<yellow> Clique Esquerdo <gray> para baixar."
      right-click-to-toggle: "<yellow> Clique Direito <gray> para alternar."
      click-to-install: "<yellow> Clique <gray> para instalar."
      click-to-reset-all: "<yellow> Clique <gray> para redefinir todos."
      right-click-to-select: "<yellow> Clique Direito <gray> para selecionar."
      right-click-to-deselect: "<yellow> Clique Direito <gray> para desselecionar."
      left-click-to-choose: "<yellow> Clique Esquerdo <gray> para escolher."
      click-to-buy: "<yellow> Clique <gray> para comprar."
      click-to-cancel: "<yellow> Clique <gray> para cancelar."
      click-to-save: "<yellow> Clique <gray> para salvar."
      click-to-deselect: "<yellow> Clique <gray> para desselecionar."
      click-on-item: |-
        <yellow> Clique <gray> no item em

      click-to-toggle: "<yellow> Clique <gray> para alternar."
      click-to-change: "<yellow> Clique <gray> para alterar."
      shift-click-to-reset: "<yellow> Shift Clique <gray> para redefinir."
      click-to-add: "<yellow> Clique <gray> para adicionar."
      click-to-remove: "<yellow> Clique <gray> para remover."
      left-click-to-cycle: "<yellow> Clique Esquerdo <gray> para ciclo para baixo."

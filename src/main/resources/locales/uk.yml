          <gray> на Minecraft Wiki.
        lush: Пишні біоми
        dry: Сухі біоми
        cold: Холодні біоми
        snowy: Засніжені біоми
        ocean: Океанські біоми
        nether: Біоми Пустоти
        the_end: Енд біоми
        neutral: Нейтральні біоми
        unused: Невикористані біоми

      unlock_level:
        name: "<white><bold> Рівень"
        description: |-
          <gray> Дозволяє змінювати
          <gray> необхідний рівень острова
          <gray> за розблокування цього біому.
        value: "<gray> Поточний рівень: <yellow> [number]"

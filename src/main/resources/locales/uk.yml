---
biomes:
  commands:
    admin:
      main:
        description: головна команда адміністратора біомів
      import:
        parameters: "<file>"
        description: імпортує біоми
        confirmation: Це видалить існуючі біоми з [gamemode] та імпортує нові біоми
          з файлу шаблону – підтвердьте
      migrate:
        description: переносить збережені дані біомів у новий формат
      set:
        description: змінює біом для гравця
        parameters: "<player> <biome-id> [mode] [size]"
      unlock:
        description: розблоковує біом для гравця без перевірок. Якщо додати `true`
          у кінці, це буде позначено як придбане.
        parameters: "<player> <biome-id> [true]"
      clear-queue:
        description: очищає чергу оновлення біома
    player:
      main:
        description: відкриває графічний інтерфейс вибору біомів
      set:
        description: змінює біом для гравця
        parameters: "<biome-id> [mode] [size]"
      buy:
        description: купує запитаний біом
        parameters: "<biome-id>"
      info:
        description: надсилає повідомлення чату з детальним описом біома
        parameters: "<biome-id>"
  gui:
    titles:
      player-panel: "<black><bold> Виберіть Біом"
      buy-panel: "<black><bold> Придбати біом"
      advanced-panel: "<black><bold> Режим оновлення"
      admin-panel: "<black><bold> Графічний інтерфейс адміністратора"
      settings: "<black><bold> Налаштування"
      library: "<black><bold> Бібліотека"
      manage-biomes: "<black><bold> Керуйте біомами"
      manage-bundles: "<black><bold> Керувати пакетами"
      manage-islands: "<black><bold> Керування даними островів"
      edit-biome: "<black><bold> Редагувати біом: [biome]"
      edit-bundle: "<black><bold> Редагувати пакет: [bundle]"
      edit-island: "<black><bold> Редагувати острів: [island]"
      environment-selector: "<black><bold> Виберіть середовище"
      biome-selector: "<black><bold> Виберіть Біом"
      bundle-selector: "<black><bold> Виберіть пакет"
      item-selector: "<black><bold> Вибрати елементи"
    buttons:
      island:
        name: "<white><bold> Острів"
        description: |-
          <gray> Повністю змінює біом
          <gray> острів.
      chunk:
        name: "<white><bold> Чанк"
        description: "<gray> Змінює біом частинами."
      range:
        name: "<white><bold> Діапазон"
        description: "<gray> Змінює біом за діапазоном."
      reduce:
        name: "<white><bold> Зменшити"
        description: "<gray> Зменшити на <yellow> [number]"
      increase:
        name: "<white><bold> Збільшити"
        description: "<gray> Збільшити на <yellow> [number]"
      accept:
        name: "<white><bold> Застосувати зміни"
        description: |-
          <gray> Змінює біом на <yellow> [biome]

          <gray> Режим оновлення: <yellow> [mode]
          <gray> Діапазон оновлення: <yellow> [number]
      return:
        name: "<white><bold> Повернутися"
        description: "<gray> Повернення до попереднього меню."
      previous:
        name: "<white><bold> Попередня сторінка"
        description: "<gray> Перейти на сторінку <yellow> [number] <gray>"
      next:
        name: "<white><bold> Наступна сторінка"
        description: "<gray> Перейти на сторінку <yellow> [number] <gray>"
      quit:
        name: "<white><bold> Вийти"
        description: "<gray> Вийти з GUI."
      save:
        name: "<white><bold> Зберегти"
        description: "<gray> Збережіть зміни та поверніться."
      cancel:
        name: "<white><bold> Скасувати"
        description: "<gray> Скасувати зміни та повернутися."
      search:
        name: "<white><bold> Пошук"
        description: |-
          <gray> Дозволяє шукати
          <gray> елемент із введенням
          <gray> текстове значення.
        search: "<aqua> Значення: [value]"
      buy:
        name: "<white><bold> Купівля"
        description: "<gray> Придбайте новий біом."
      manage_islands:
        name: "<white><bold> Керувати островами"
        description: |-
          <gray> Дозволяє керувати островом
          <gray> даних.
      manage_biomes:
        name: "<white><bold> Керуйте біомами"
        description: |-
          <gray> Дозволяє керувати біомами
          <gray> даних.
      manage_bundles:
        name: "<white><bold> Керувати пакетами"
        description: |-
          <gray> Дозволяє керувати пакетами
          <gray> даних.
      settings:
        name: "<white><bold> Налаштування"
        description: |-
          <gray> Дозволяє змінити деякі
          <gray> налаштувань аддона.
      import_template:
        name: "<white><bold> Імпортувати шаблон"
        description: |-
          <gray> Імпортувати шаблон
          <gray> файл, розташований усередині
          <gray> каталог аддонів.
      web_library:
        name: "<white><bold> Веб-бібліотека"
        description: |-
          <gray> Доступ до Інтернету
          <gray> бібліотека, яка містить
          <gray> спільних біомів.
      export_from_database:
        name: "<white><bold> Експорт бази даних"
        description: |-
          <gray> Експорт бази даних
          <gray> в один файл, розташований у
          <gray> каталог аддонів.
      import_to_database:
        name: "<white><bold> Імпорт бази даних"
        description: |-
          <gray> Імпорт бази даних із
          <gray> файл, розташований у додатку
          <gray> каталог.
      wipe_islands_data:
        name: "<white><bold> Очистити базу даних острова"
        description: |-
          <gray> Очистити всі дані користувача біомів
          <gray> для цього ігрового режиму.
      wipe_biomes_data:
        name: "<white><bold> Очистити базу даних біомів"
        description: |-
          <gray> Очистити всі біоми та комплект
          <gray> дані для цього ігрового режиму.
      add_biome:
        name: "<white><bold> Додати біом"
        description: |-
          <gray> Створює новий біом, який
          <gray> гравців можуть використовувати за допомогою
          <gray> панелей користувача.
      remove_biome:
        name: "<white><bold> Видалити біом"
        description: |-
          <gray> Видаляє вибрані біоми
          <gray> з панелей користувача.
        title: "<yellow> Вибрані біоми:"
        value: "<yellow> - [biome]"
      accept_selected:
        name: "<white><bold> Прийняти вибране"
        description: "<gray> Приймає вибрані елементи."
        title: "<yellow> Вибрані елементи:"
        element: "<yellow> - [element]"
      environment_element:
        name: "<white><bold> [environment]"
        description: "<gray> [description]."
      properties:
        name: "<white><bold> Властивості"
        description: "<gray> Переглянути основні властивості біома."
      change_properties:
        name: "<white><bold> Змінити властивості"
        description: "<gray> Перегляньте зміни властивостей біома."
      unlock_properties:
        name: "<white><bold> Розблокувати властивості"
        description: "<gray> Переглянути розблоковані властивості біома."
      biome:
        name: "<white><bold> [biome]"
        description: "<gray> Тип біома Minecraft."
        value: "<gray> Біом ID: <yellow> [id]"
      name:
        name: "<white><bold> Відображуване ім'я"
        description: |-
          <gray> Відображувана назва біома.
          <gray> Підтримує кольорові коди.
        value: "<gray> Поточне значення: <reset> [name]"
      deployed:
        name: "<white><bold> Розгорнуто"
        description: |-
          <gray> Перемикає, якщо біом є
          <gray> доступний для гравців
          <gray> чи ні.
        enabled: "<dark_green> Увімкнено"
        disabled: "<red> Вимкнено"
      environment:
        name: "<white><bold> Розмір"
        description: |-
          <gray> Дозволяє обмежити, у якому
          <gray> вимірювати біом
          <gray> можна застосувати.
        enabled: "<dark_green>"
        disabled: "<red>"
      icon:
        name: "<white><bold> Значок"
        description: |-
          <gray> Дозволяє змінити значок
          <gray> для цього біома.
      order:
        name: "<white><bold> Порядок"
        description: |-
          <gray> Дозволяє змінювати порядок
          <gray> об'єктів.
          <gray> Об’єкти з рівними номерами
          <gray> замовлять їх
          <gray> унікальних імен ідентифікаторів.
        value: "<gray> Поточне замовлення: <yellow> [number]"
      description:
        name: "<white><bold> Опис"
        description: |-
          <gray> Конкретний опис
          <gray> для біома. Колір

        unknown: "<red> Невідомий власник"
        description: |-
          [owner]
          [members]
          [id]
        owner: "<gray> Власник: <yellow> [player]"
        title: "<gray> членів острова:"
        element: " <gray> - <yellow> [player]"
      change_biome:
        name: "<white><bold> Змінити біом"
        description: "<gray> Змінити біом для кожного острова."
      manage_data:
        name: "<white><bold> Керувати даними острова"

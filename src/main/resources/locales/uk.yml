        name: "<white><bold> Вартість"
        description: |-
          <gray> Дозволяє змінювати вартість
          <gray> застосування цього біому.
        value: "<gray> Поточна вартість: <yellow> $[number]"
      change_items:
        name: "<white><bold> Предмети"
        description: |-
          <gray> Дозволяє змінювати елементи
          <gray> за застосування цього біома.
        title: "<yellow> Предмети:"
        element: " <dark_gray> - [number]x[item]"
        none: "<gray> Елементи не встановлено."
      change_type:
        name: "<white><bold> [type]"
        description: |-
          <gray> Дозволяє змінити тип вартості
          <gray> за застосування цього біома.
        static:
          name: Статичне значення
          description: |-
            <gray> Вартість зміни біома
            <gray> не змінюється.
        per_block:
          name: За блок
          description: |-
            <gray> Вартість зміни біома становить
            <gray> розраховується на блок.
        per_usage:
          name: За використання
          description: |-
            <gray> Вартість зміни біома становить

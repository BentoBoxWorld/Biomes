---
biomes:
  commands:
    admin:
      main:
        description: commande d'administration principale des biomes
      import:
        parameters: "[overwrite]"
        description: La commande Admin IMPORT permet d'importer des biomes à partir
          de biomes.yml file. Ajouter «écraser» à la fin écrasera les biomes existants.
        confirmation: Cela supprimera les biomes existants de [gamemode] et importera
          de nouveaux biomes à partir du fichier modèle - veuillez confirmer
      migrate:
        description: migre les données stockées des biomes vers un nouveau format
      set:
        description: La commande Admin SET permet de changer le biome de l’île de
          <player>. <type> et <size> n'est pas requis.
        parameters: "<player> <biome> [<type>] [<size>]"
      unlock:
        description: déverrouille le biome pour le joueur sans vérification. L'ajout
          de "true" à la fin le marquera comme acheté.
        parameters: "<player> <biome-id> [true]"
      clear-queue:
        description: efface la file d'attente de mise à jour du biome
    player:
      main:
        description: ouvre l'interface graphique de sélection des biomes
      set:
        description: change le biome pour le joueur
        parameters: "<biome-id> [mode] [size]"
      buy:
        description: achète le biome demandé
        parameters: "<biome-id>"
      info:
        description: envoie un message de chat avec une description détaillée du biome
        parameters: "<biome-id>"
  gui:
    titles:
      player-panel: "<black><bold> Choisir un biome"
      buy-panel: "<black><bold> Acheter un biome"
      advanced-panel: "<black><bold> Mode de mise à jour"
      admin-panel: "<black><bold> Interface graphique d'administration"
      settings: "<black><bold> Paramètres"
      library: "<black><bold> Bibliothèque"
      manage-biomes: "<black><bold> Gérer les biomes"
      manage-bundles: "<black><bold> Gérer les groupes"
      manage-islands: "<black><bold> Gérer les données des îles"
      edit-biome: "<black><bold> Modifier le biome : [biome]"
      edit-bundle: "<black><bold> Modifier l'ensemble : [bundle]"
      edit-island: "<black><bold> Modifier l'île : [island]"
      environment-selector: "<black><bold> Sélectionner l'environnement"
      biome-selector: "<black><bold> Sélectionner un biome"
      bundle-selector: "<black><bold> Sélectionner l'ensemble"
      item-selector: "<black><bold> Sélectionner les éléments"
    buttons:
      island:
        name: "<white><bold> île"
        description: |-
          <gray> Change le biome dans son ensemble
          <gray> île.
      chunk:
        name: "<white><bold> Chunk"
        description: "<gray> Modifie le biome par tranches."
      range:
        name: "<white><bold> Range"
        description: "<gray> Modifie le biome par range."
      reduce:
        name: "<white><bold> Réduire"
        description: "<gray> Réduire de <yellow> [nombre]"
      increase:
        name: "<white><bold> Augmenter"
        description: "<gray> Augmenter de <yellow> [nombre]"
      accept:
        name: "<white><bold> Appliquer les changement"
        description: |-
          <gray> Change le biome en <yellow> [biome]

          <gray> Mode de mise à jour : <yellow> [mode]
          <gray> Plage de mise à jour : <yellow> [number]
      return:
        name: "<white><bold> Retour"
        description: "<gray> Retour au menu précèdent."
      previous:
        name: "<white><bold> Page précédente"
        description: "<gray> Passer à <yellow> [number] <gray> page"
      next:
        name: "<white><bold> Page suivante"
        description: "<gray> Passer à <yellow> [number] <gray> page"
      quit:

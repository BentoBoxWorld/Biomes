biomes:
  commands:
    # 이 섹션은 관리자 명령어 번역만 포함합니다.
    admin:
      main:
        description: "바이옴 관리자 명령어"
      import:
        parameters: "<file>"
        description: "바이옴 가져오기"
        confirmation: "이렇게 하면 [gamemode]의 기존 바이옴이 제거되고 템플릿 파일에서 새 바이옴을 가져옵니다 - 확인해주세요"
      migrate:
        description: "저장된 바이옴 데이터를 새 형식으로 마이그레이션합니다"
      set:
        description: "플레이어의 바이옴을 변경합니다"
        parameters: "<player> <biome-id> [mode] [size]"
      unlock:
        description: "검사 없이 플레이어를 위해 바이옴을 해제합니다. 끝에 `true`를 추가하면 구매한 것으로 표시됩니다."
        parameters: "<player> <biome-id> [true]"
      clear-queue:
        description: "바이옴 업데이트 큐를 비웁니다"
    # 이 섹션은 플레이어 명령어 번역만 포함합니다.
    player:
      main:
        description: "바이옴 선택 GUI 열기"
      set:
        description: "플레이어의 바이옴을 변경합니다"
        parameters: "<biome-id> [mode] [size]"
      buy:
        description: "요청한 바이옴을 구매합니다"
        parameters: "<biome-id>"
      info:
        description: "상세한 바이옴 설명이 포함된 채팅 메시지를 보냅니다"
        parameters: "<biome-id>"
  gui:
    titles:
      player-panel: "<black><bold> 바이옴 선택"
      buy-panel: "<black><bold> 바이옴 구매"
      advanced-panel: "<black><bold> 업데이트 모드"
      admin-panel: "<black><bold> 관리자 GUI"
      settings: "<black><bold> 설정"
      library: "<black><bold> 라이브러리"
      manage-biomes: "<black><bold> 바이옴 관리"
      manage-bundles: "<black><bold> 번들 관리"
      manage-islands: "<black><bold> 섬 데이터 관리"
      edit-biome: "<black><bold> 바이옴 편집: [biome]"
      edit-bundle: "<black><bold> 번들 편집: [bundle]"
      edit-island: "<black><bold> 섬 편집: [island]"
      environment-selector: "<black><bold> 차원 선택"
      biome-selector: "<black><bold> 바이옴 선택"
      bundle-selector: "<black><bold> 번들 선택"
      item-selector: "<black><bold> 아이템 선택"
    buttons:
      island:
        name: "<white><bold> 섬"
        description: |-
          <gray> 전체 섬의 바이옴을
          <gray> 변경합니다.
      chunk:
        name: "<white><bold> 청크"
        description: |-
          <gray> 청크 단위로 바이옴을
          <gray> 변경합니다.
      range:
        name: "<white><bold> 범위"
        description: |-
          <gray> 범위에 따라 바이옴을
          <gray> 변경합니다.
      reduce:
        name: "<white><bold> 감소"
        description: |-
          <gray> <yellow> [number] <gray> 만큼 감소
      increase:
        name: "<white><bold> 증가"
        description: |-
          <gray> <yellow> [number] <gray> 만큼 증가
      accept:
        name: "<white><bold> 변경 적용"
        description: |-
          <gray> 바이옴을 <yellow> [biome] <gray> 로 변경합니다

          <gray> 업데이트 모드: <yellow> [mode]
          <gray> 업데이트 범위: <yellow> [number]
      return:
        name: "<white><bold> 돌아가기"
        description: |-
          <gray> 이전 메뉴로 돌아갑니다.
      previous:
        name: "<white><bold> 이전 페이지"
        description: |-
          <gray> <yellow> [number] <gray> 페이지로 이동합니다
      next:
        name: "<white><bold> 다음 페이지"
        description: |-
          <gray> <yellow> [number] <gray> 페이지로 이동합니다
      quit:
        name: "<white><bold> 종료"
        description: |-
          <gray> GUI를 닫습니다.
      save:
        name: "<white><bold> 저장"
        description: |-
          <gray> 변경사항을 저장하고 돌아갑니다.
      cancel:
        name: "<white><bold> 취소"
        description: |-
          <gray> 변경사항을 취소하고 돌아갑니다.
      search:
        name: "<white><bold> 검색"
        description: |-
          <gray> 입력 텍스트 값으로
          <gray> 요소를 검색합니다.
        search: "<aqua> 값: [value]"
      buy:
        name: "<white><bold> 구매"
        description: |-
          <gray> 새로운 바이옴을 구매합니다.
      manage_islands:
        name: "<white><bold> 섬 관리"
        description: |-
          <gray> 섬 데이터를 관리합니다.
      manage_biomes:
        name: "<white><bold> 바이옴 관리"
        description: |-
          <gray> 바이옴 데이터를 관리합니다.
      manage_bundles:
        name: "<white><bold> 번들 관리"
        description: |-
          <gray> 번들 데이터를 관리합니다.
      settings:
        name: "<white><bold> 설정"
        description: |-
          <gray> 애드온 설정을 변경합니다.
      import_template:
        name: "<white><bold> 템플릿 가져오기"
        description: |-
          <gray> 애드온 디렉토리에 있는
          <gray> 템플릿 파일을
          <gray> 가져옵니다.
      web_library:
        name: "<white><bold> 웹 라이브러리"
        description: |-
          <gray> 공유 바이옴이 포함된
          <gray> 웹 라이브러리에
          <gray> 액세스합니다.
      export_from_database:
        name: "<white><bold> 데이터베이스 내보내기"
        description: |-
          <gray> 데이터베이스를 애드온
          <gray> 디렉토리에 있는 단일 파일로
          <gray> 내보냅니다.
      import_to_database:
        name: "<white><bold> 데이터베이스 가져오기"
        description: |-
          <gray> 애드온 디렉토리에 있는
          <gray> 파일에서 데이터베이스를
          <gray> 가져옵니다.
      wipe_islands_data:
        name: "<white><bold> 섬 데이터 지우기"
        description: |-
          <gray> 이 게임모드의 모든
          <gray> 바이옴 사용자 데이터를 지웁니다.
      wipe_biomes_data:
        name: "<white><bold> 바이옴 데이터 지우기"
        description: |-
          <gray> 이 게임모드의 모든 바이옴
          <gray> 및 번들 데이터를 지웁니다.
      add_biome:
        name: "<white><bold> 바이옴 추가"
        description: |-
          <gray> 플레이어가 사용자 패널에서
          <gray> 사용할 수 있는 새로운
          <gray> 바이옴을 생성합니다.
      remove_biome:
        name: "<white><bold> 바이옴 제거"
        description: |-
          <gray> 사용자 패널에서 선택한
          <gray> 바이옴을 제거합니다.
        title: "<yellow> 선택된 바이옴:"
        value: "<yellow> - [biome]"
      accept_selected:
        name: "<white><bold> 선택 항목 적용"
        description: |-
          <gray> 선택된 요소를 적용합니다.
        title: "<yellow> 선택된 요소:"
        element: "<yellow> - [element]"
      environment_element:
        name: "<white><bold> [environment]"
        description: |-
          <gray> [description].
      properties:
        name: "<white><bold> 속성"
        description: |-
          <gray> 주요 바이옴 속성을 봅니다.
      change_properties:
        name: "<white><bold> 변경 속성"
        description: |-
          <gray> 바이옴 변경 속성을 봅니다.
      unlock_properties:
        name: "<white><bold> 해제 속성"
        description: |-
          <gray> 바이옴 해제 속성을 봅니다.
      biome:
        name: "<white><bold> [biome]"
        description: |-
          <gray> 마인크래프트 바이옴 타입.
        value: "<gray> 바이옴 ID: <yellow> [id]"
      name:
        name: "<white><bold> 표시 이름"
        description: |-
          <gray> 바이옴의 표시 이름.
          <gray> 색상 코드를 지원합니다.
        value: "<gray> 현재 값: <reset> [name]"
      deployed:
        name: "<white><bold> 배포됨"
        description: |-
          <gray> 바이옴이 플레이어에게
          <gray> 접근 가능한지 여부를
          <gray> 전환합니다.
        enabled: "<dark_green> 활성화됨"
        disabled: "<red> 비활성화됨"
      environment:
        name: "<white><bold> 차원"
        description: |-
          <gray> 바이옴을 적용할 수 있는
          <gray> 차원을 제한합니다.
        enabled: "<dark_green>"
        disabled: "<red>"
      icon:
        name: "<white><bold> 아이콘"
        description: |-
          <gray> 이 바이옴의 아이콘을
          <gray> 변경합니다.
      order:
        name: "<white><bold> 순서"
        description: |-
          <gray> 객체의 순서를 변경합니다.
          <gray> 같은 번호를 가진 객체는
          <gray> 고유 ID 이름으로 정렬됩니다.
        value: "<gray> 현재 순서: <yellow> [number]"
      description:
        name: "<white><bold> 설명"
        description: |-
          <gray> 바이옴의 특정 설명.
          <gray> 색상 코드를 적용해야 합니다.
        value: "<yellow> 현재 설명:"
        none: "<gray> 설명이 설정되지 않았습니다."
      unlock_permissions:
        name: "<white><bold> 권한"
        description: |-
          <gray> 이 바이옴에 액세스하기
          <gray> 위한 해제 권한을
          <gray> 변경합니다.
        title: "<yellow> 권한: "
        element: " <dark_gray> - [permission]"
        none: "<gray> 권한이 설정되지 않았습니다."
      unlock_cost:
        name: "<white><bold> 비용"
        description: |-
          <gray> 이 바이옴을 해제하는
          <gray> 비용을 변경합니다.
        value: "<gray> 현재 비용: <yellow> [number]"
      unlock_items:
        name: "<white><bold> 아이템"
        description: |-
          <gray> 이 바이옴을 해제하기
          <gray> 위한 아이템을 변경합니다.
        title: "<yellow> 아이템: "
        element: " <dark_gray> - [number]x[item]"
        none: "<gray> 아이템이 설정되지 않았습니다."
      unlock_level:
        name: "<white><bold> 레벨"
        description: |-
          <gray> 이 바이옴을 해제하기
          <gray> 위한 필수 섬 레벨을
          <gray> 변경합니다.
        value: "<gray> 현재 레벨: <yellow> [number]"
      change_cost:
        name: "<white><bold> 비용"
        description: |-
          <gray> 이 바이옴을 적용하는
          <gray> 비용을 변경합니다.
        value: "<gray> 현재 비용: <yellow> [number]"
      change_items:
        name: "<white><bold> 아이템"
        description: |-
          <gray> 이 바이옴을 적용하기
          <gray> 위한 아이템을 변경합니다.
        title: "<yellow> 아이템: "
        element: " <dark_gray> - [number]x[item]"
        none: "<gray> 아이템이 설정되지 않았습니다."
      change_type:
        name: "<white><bold> [type]"
        description: |-
          <gray> 이 바이옴을 적용하기
          <gray> 위한 비용 유형을 변경합니다.
        static:
          name: "정적 값"
          description: |-
            <gray> 바이옴 변경 비용은
            <gray> 변하지 않습니다.
        per_block:
          name: "블록당"
          description: |-
            <gray> 바이옴 변경 비용은
            <gray> 블록 단위로 계산됩니다.
        per_usage:
          name: "사용당"
          description: |-
            <gray> 바이옴 변경 비용은
            <gray> 각 사용 후 증가합니다.
        enabled: "<dark_green>"
        disabled: "<red>"
      change_increment:
        name: "<white><bold> 증분"
        description: |-
          <gray> 사용당 증분을
          <gray> 변경합니다.
        value: "<gray> 현재 값: <yellow> [number]"
      biome-filter:
        name: "<white><bold> [filter]"
        description: |-
          <gray> 마인크래프트 위키 기반
          <gray> 바이옴 필터.
        lush: "무성한 바이옴"
        dry: "건조한 바이옴"
        cold: "추운 바이옴"
        snowy: "눈 덮인 바이옴"
        aquatic: "해양 바이옴"
        nether: "네더 바이옴"
        the_end: "엔드 바이옴"
        neutral: "중립 바이옴"
        unused: "사용되지 않는 바이옴"
        warm: "따뜻한 바이옴"
        cave: "동굴 바이옴"
        temperate: "온화한 바이옴"
      protection_range:
        name: "<white><bold> 보호 범위"
        description: |-
          <gray> 바이옴 변경을 전체 섬이
          <gray> 아닌 섬 보호 범위로만
          <gray> 제한합니다.
        enabled: "<dark_green> 활성화됨"
        disabled: "<red> 비활성화됨"
      reset:
        name: "<white><bold> 소유자 변경 시 리셋"
        description: |-
          <gray> 섬의 소유자가 변경되고
          <gray> 새 소유자가 현재 바이옴
          <gray> 권한이 없으면 강제로 기본
          <gray> 바이옴으로 변경합니다.
        enabled: "<dark_green> 활성화됨"
        disabled: "<red> 비활성화됨"
      cool_down:
        name: "<white><bold> 바이옴 쿨다운"
        description: |-
          <gray> 플레이어가 다시 바이옴을
          <gray> 변경할 때까지의 시간(초)을
          <gray> 설정합니다.
        value: "<gray> 현재 쿨다운: <yellow> [number]"
        disabled: "<yellow> 쿨다운이 비활성화되었습니다."
      default_size:
        name: "<white><bold> 기본 범위"
        description: |-
          <gray> 플레이어가 바이옴을
          <gray> 변경할 때 범위를 쓰지
          <gray> 않으면 사용될 숫자를 설정합니다.
        value: "<gray> 기본 범위: <yellow> [number]"
      default_mode:
        name: "<white><bold> 기본 업데이트 모드"
        description: |-
          <gray> 플레이어가 업데이트
          <gray> 모드를 제공하지 않을 때
          <gray> 사용할 기본값을 설정합니다.
        enabled: "<dark_green>"
        disabled: "<red>"
      unlock_notify:
        name: "<white><bold> 해제 시 알림"
        description: |-
          <gray> 사용자가 새로운 바이옴을
          <gray> 해제할 때 메시지가
          <gray> 전송됩니다.
        enabled: |-
          <aqua> 해제 시 알림이 <green> 활성화 <aqua> 되었습니다.
        disabled: |-
          <aqua> 해제 시 알림이 <red> 비활성화 <aqua> 되었습니다.
      change_timeout:
        name: "<white><bold> 변경 시간 초과"
        description: |-
          <gray> 바이옴 업데이트가
          <gray> 종료될 때까지의 시간(분)을
          <gray> 설정합니다.
          <gray> 매우 큰 섬이나 과부하 상태의
          <gray> 서버에서 발생할 수 있습니다.
        value: "<gray> 시간 초과: <yellow> [number] 분"
      parallel_updates:
        name: "<white><bold> 병렬 업데이트"
        description: |-
          <gray> 동시에 발생할 수 있는
          <gray> 바이옴 업데이트 개수를
          <gray> 설정합니다.
          <gray> 나머지는 큐에 배치됩니다.
        value: |-
          <gray> 현재 값: <yellow>[number]<gray>.
      use_bank:
        name: "<white><bold> 은행 계정 사용"
        description: |-
          <gray> Biomes 애드온이 수행하는
          <gray> 모든 결제가 은행 애드온
          <gray> 섬 계정을 사용할지 여부를
          <gray> 전환합니다.
        enabled: |-
          <aqua> 은행 계정 사용이 <green> 활성화 <aqua> 되었습니다.
        disabled: |-
          <aqua> 은행 계정 사용이 <red> 비활성화 <aqua> 되었습니다.
        missing: |-
          <red> 은행 애드온이 설치되어 있지 않습니다.
      visibility:
        name: "<white><bold> 바이옴 가시성"
        description: |-
          <gray> 바이옴 선택 패널에서
          <gray> 플레이어 바이옴 가시성을
          <gray> 변경합니다.
        enabled: "<dark_green>"
        disabled: "<red>"
        all: "모든 바이옴"
        deployed: "배포된 바이옴"
        accessible: "접근 가능한 바이옴"
        toggleable: "토글 가능"
      is_online:
        name: "<white><bold> 온라인 플레이어 섬"
        description: |-
          <gray> 구성원이 온라인인
          <gray> 모든 섬을 나열합니다.
      all_islands:
        name: "<white><bold> 모든 섬"
        description: |-
          <gray> 현재 게임모드에서
          <gray> 생성된 모든 섬의
          <gray> 목록입니다.
      island_name:
        name: "<white><bold> [name]"
        island-owner: "[player]"
        unknown: "<red> 알 수 없는 소유자"
        description: |-
          [owner]
          [members]
          [id]
        owner: "<gray> 소유자: <yellow> [player]"
        title: "<gray> 섬 구성원:"
        element: " <gray> - <yellow> [player]"
      change_biome:
        name: "<white><bold> 바이옴 변경"
        description: |-
          <gray> 섬별로 바이옴을 변경합니다.
      manage_data:
        name: "<white><bold> 섬 데이터 관리"
        description: |-
          <gray> 특정 섬에 저장된
          <gray> 데이터를 관리합니다.
      clear_data:
        name: "<white><bold> 섬 데이터 지우기"
        description: |-
          <gray> 섬의 모든 저장된
          <gray> 데이터를 지웁니다.
      island_bundle:
        name: "<white><bold> 섬 번들"
        description: |-
          <gray> 현재 섬에 할당된 번들.

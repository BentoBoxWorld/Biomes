biomes:
  commands:
    # Ovaj odsjek sadrži samo prijevode admin naredbi.
    admin:
      main:
        description: "glavna naredba admin biomima"
      import:
        parameters: "<file>"
        description: "uvozi biome"
        confirmation: "Ovo će ukloniti postojeće biome iz [gamemode] i uvesti nove biome iz datoteke šablone - molimo potvrdite"

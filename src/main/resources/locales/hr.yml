      clear-queue:
        description: "briše red čekanja ažuriranja biomima"
    # Ovaj odsjek sadrži samo prijevode igračvih naredbi.
    player:
      main:
        description: "otvara GUI za odabir biomima"
      set:
        description: "mijenja biom za igrača"
        parameters: "<biome-id> [mode] [size]"
      buy:
        description: "kupuje traženi biom"
        parameters: "<biome-id>"
      info:
        description: "šalje poruku u chat s detaljnim opisom biomima"
        parameters: "<biome-id>"

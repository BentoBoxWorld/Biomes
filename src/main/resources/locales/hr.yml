        description: "migrira pohranjena podatke biomima u novi format"
      set:
        description: "mijenja biom za igrača"
        parameters: "<player> <biome-id> [mode] [size]"
      unlock:
        description: "otključava biom za igrača bez provjere. Dodavanjem `true` na kraju će ga označiti kao kupljenog."

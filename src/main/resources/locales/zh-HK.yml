biomes:
  commands:
    # This section contains only admin commands translations.
    admin:
      main:
        description: "主要生物群系管理指令"
      import:
        parameters: "<file>"
        description: "匯入生物群系"
        confirmation: "這將移除 [gamemode] 中現有的生物群系並從範本檔案匯入新的生物群系 - 請確認"
      migrate:
        description: "將生物群系儲存的資料遷移到新格式"
      set:
        description: "更改玩家的生物群系"
        parameters: "<player> <biome-id> [mode] [size]"
      unlock:
        description: "不經檢查為玩家解鎖生物群系。在末尾添加 `true` 將其標記為已購買。"
        parameters: "<player> <biome-id> [true]"
      clear-queue:
        description: "清空生物群系更新隊列"
    # This section contains only player commands translations.
    player:
      main:
        description: "打開生物群系選擇介面"
      set:
        description: "更改玩家的生物群系"
        parameters: "<biome-id> [mode] [size]"
      buy:
        description: "購買要求的生物群系"
        parameters: "<biome-id>"
      info:
        description: "發送一條聊天訊息，包含詳細的生物群系描述"
        parameters: "<biome-id>"
  gui:
    titles:
      player-panel: "<black><bold> 選擇生物群系"
      buy-panel: "<black><bold> 購買生物群系"
      advanced-panel: "<black><bold> 更新模式"
      admin-panel: "<black><bold> 管理員介面"
      settings: "<black><bold> 設定"
      library: "<black><bold> 資料庫"
      manage-biomes: "<black><bold> 管理生物群系"
      manage-bundles: "<black><bold> 管理套件"
      manage-islands: "<black><bold> 管理島嶼資料"
      edit-biome: "<black><bold> 編輯生物群系: [biome]"
      edit-bundle: "<black><bold> 編輯套件: [bundle]"
      edit-island: "<black><bold> 編輯島嶼: [island]"
      environment-selector: "<black><bold> 選擇環境"
      biome-selector: "<black><bold> 選擇生物群系"
      bundle-selector: "<black><bold> 選擇套件"
      item-selector: "<black><bold> 選擇物品"
    buttons:
      island:
        name: "<white><bold> 島嶼"
        description: |-
          <gray> 更改整個
          <gray> 島嶼的生物群系。
      chunk:
        name: "<white><bold> 區塊"
        description: |-
          <gray> 在區塊中更改生物群系。
      range:
        name: "<white><bold> 範圍"
        description: |-
          <gray> 按範圍更改生物群系。
      reduce:
        name: "<white><bold> 減少"
        description: |-
          <gray> 減少 <yellow> [number]
      increase:
        name: "<white><bold> 增加"
        description: |-
          <gray> 增加 <yellow> [number]
      accept:
        name: "<white><bold> 應用更改"
        description: |-
          <gray> 將生物群系更改為 <yellow> [biome]

          <gray> 更新模式: <yellow> [mode]
          <gray> 更新範圍: <yellow> [number]
      return:
        name: "<white><bold> 返回"
        description: |-
          <gray> 返回上一個選單。
      previous:
        name: "<white><bold> 上一頁"
        description: |-
          <gray> 切換到第 <yellow> [number] <gray> 頁
      next:
        name: "<white><bold> 下一頁"
        description: |-
          <gray> 切換到第 <yellow> [number] <gray> 頁
      quit:
        name: "<white><bold> 退出"
        description: |-
          <gray> 退出介面。
      save:
        name: "<white><bold> 儲存"
        description: |-
          <gray> 儲存更改並返回。
      cancel:
        name: "<white><bold> 取消"
        description: |-
          <gray> 取消更改並返回。
      search:
        name: "<white><bold> 搜尋"
        description: |-
          <gray> 允許搜尋一個
          <gray> 具有輸入文字
          <gray> 值的元素。
        search: "<aqua> 值: [value]"
      buy:
        name: "<white><bold> 購買"
        description: |-
          <gray> 購買新生物群系。
      manage_islands:
        name: "<white><bold> 管理島嶼"
        description: |-
          <gray> 允許管理島嶼
          <gray> 資料。
      manage_biomes:
        name: "<white><bold> 管理生物群系"
        description: |-
          <gray> 允許管理生物群系
          <gray> 資料。
      manage_bundles:
        name: "<white><bold> 管理套件"
        description: |-
          <gray> 允許管理套件
          <gray> 資料。
      settings:
        name: "<white><bold> 設定"
        description: |-
          <gray> 允許更改一些
          <gray> 插件設定。
      import_template:
        name: "<white><bold> 匯入範本"
        description: |-
          <gray> 匯入位於
          <gray> 插件目錄內的範本
          <gray> 檔案。
      web_library:
        name: "<white><bold> 網路資料庫"
        description: |-
          <gray> 訪問包含
          <gray> 共享生物群系的網路
          <gray> 資料庫。
      export_from_database:
        name: "<white><bold> 匯出資料庫"
        description: |-
          <gray> 將資料庫匯出
          <gray> 到位於插件目錄中的
          <gray> 單個檔案。
      import_to_database:
        name: "<white><bold> 匯入資料庫"
        description: |-
          <gray> 從位於插件
          <gray> 目錄中的檔案匯入
          <gray> 資料庫。
      wipe_islands_data:
        name: "<white><bold> 清除島嶼資料庫"
        description: |-
          <gray> 清除此遊戲模式下
          <gray> 所有生物群系使用者資料。
      wipe_biomes_data:
        name: "<white><bold> 清除生物群系資料庫"
        description: |-
          <gray> 清除此遊戲模式下
          <gray> 所有生物群系和套件資料。
      add_biome:
        name: "<white><bold> 新增生物群系"
        description: |-
          <gray> 建立新生物群系
          <gray> 供玩家使用者可以使用
          <gray> 透過使用者面板使用。
      remove_biome:
        name: "<white><bold> 移除生物群系"
        description: |-
          <gray> 從使用者面板移除
          <gray> 選定的生物群系。
        title: "<yellow> 選定的生物群系:"
        value: "<yellow> - [biome]"
      accept_selected:
        name: "<white><bold> 接受已選項目"
        description: |-
          <gray> 接受選定的元素。
        title: "<yellow> 選定的元素:"
        element: "<yellow> - [element]"
      environment_element:
        name: "<white><bold> [environment]"
        description: |-
          <gray> [description]。
      properties:
        name: "<white><bold> 屬性"
        description: |-
          <gray> 檢視主要生物群系屬性。
      change_properties:
        name: "<white><bold> 更改屬性"
        description: |-
          <gray> 檢視更改生物群系屬性。
      unlock_properties:
        name: "<white><bold> 解鎖屬性"
        description: |-
          <gray> 檢視解鎖生物群系屬性。
      biome:
        name: "<white><bold> [biome]"
        description: |-
          <gray> Minecraft 生物群系類型。
        value: "<gray> 生物群系 ID: <yellow> [id]"
      name:
        name: "<white><bold> 顯示名稱"
        description: |-
          <gray> 生物群系的顯示名稱。
          <gray> 支援色彩代碼。
        value: "<gray> 目前值: <reset> [name]"
      deployed:
        name: "<white><bold> 已部署"
        description: |-
          <gray> 切換生物群系是否
          <gray> 玩家可以存取
          <gray> 或否。
        enabled: "<dark_green> 已啟用"
        disabled: "<red> 已停用"
      environment:
        name: "<white><bold> 維度"
        description: |-
          <gray> 允許限制生物群系
          <gray> 在哪個維度中
          <gray> 可以被應用。
        enabled: "<dark_green>"
        disabled: "<red>"
      icon:
        name: "<white><bold> 圖示"
        description: |-
          <gray> 允許更改此生物群系
          <gray> 的圖示。
      order:
        name: "<white><bold> 順序"
        description: |-
          <gray> 允許更改
          <gray> 物件的順序。
          <gray> 具有相同數字的物件
          <gray> 將按照其唯一 ID
          <gray> 名稱順序排列。
        value: "<gray> 目前順序: <yellow> [number]"
      description:
        name: "<white><bold> 描述"
        description: |-
          <gray> 生物群系的特定
          <gray> 描述。色彩代碼
          <gray> 必須應用於它。
        value: "<yellow> 目前描述:"
        none: "<gray> 描述未設定。"
      unlock_permissions:
        name: "<white><bold> 權限"
        description: |-
          <gray> 允許更改此
          <gray> 生物群系的解鎖權限
          <gray> 以便可以存取。
        title: "<yellow> 權限: "
        element: " <dark_gray> - [permission]"
        none: "<gray> 權限未設定。"
      unlock_cost:
        name: "<white><bold> 成本"
        description: |-
          <gray> 允許更改解鎖此
          <gray> 生物群系的成本。
        value: "<gray> 目前成本: <yellow> [number]"
      unlock_items:
        name: "<white><bold> 物品"
        description: |-
          <gray> 允許更改此生物群系
          <gray> 的解鎖物品。
        title: "<yellow> 物品: "
        element: " <dark_gray> - [number]x[item]"
        none: "<gray> 物品未設定。"
      unlock_level:
        name: "<white><bold> 等級"
        description: |-
          <gray> 允許更改解鎖此
          <gray> 生物群系所需的
          <gray> 島嶼等級。
        value: "<gray> 目前等級: <yellow> [number]"
      change_cost:
        name: "<white><bold> 成本"
        description: |-
          <gray> 允許更改應用此
          <gray> 生物群系的成本。
        value: "<gray> 目前成本: <yellow> [number]"
      change_items:
        name: "<white><bold> 物品"
        description: |-
          <gray> 允許更改應用此
          <gray> 生物群系的物品。
        title: "<yellow> 物品: "
        element: " <dark_gray> - [number]x[item]"
        none: "<gray> 物品未設定。"
      change_type:
        name: "<white><bold> [type]"
        description: |-
          <gray> 允許更改應用此
          <gray> 生物群系的成本類型。
        static:
          name: "靜態值"
          description: |-
            <gray> 生物群系更改成本
            <gray> 不會改變。
        per_block:
          name: "每個方塊"
          description: |-
            <gray> 生物群系更改成本
            <gray> 按每個方塊計算。
        per_usage:
          name: "每次使用"
          description: |-
            <gray> 生物群系更改成本
            <gray> 在每次使用後
            <gray> 增加。
        enabled: "<dark_green>"
        disabled: "<red>"
      change_increment:
        name: "<white><bold> 增量"
        description: |-
          <gray> 允許更改每次
          <gray> 使用的增量。
        value: "<gray> 目前值: <yellow> [number]"
      biome-filter:
        name: "<white><bold> [filter]"
        description: |-
          <gray> 基於 Minecraft Wiki
          <gray> 的生物群系篩選。
        lush: "茂盛生物群系"
        dry: "乾燥生物群系"
        cold: "寒冷生物群系"
        snowy: "雪地生物群系"
        aquatic: "海洋生物群系"
        nether: "下界生物群系"
        the_end: "末地生物群系"
        neutral: "中立生物群系"
        unused: "未使用生物群系"
        warm: "溫暖生物群系"
        cave: "洞穴生物群系"
        temperate: "溫帶生物群系"
      protection_range:
        name: "<white><bold> 保護範圍"
        description: |-
          <gray> 允許限制生物群系
          <gray> 更改只在島嶼保護
          <gray> 範圍內，而不是在
          <gray> 整個島嶼上更改。
        enabled: "<dark_green> 已啟用"
        disabled: "<red> 已停用"
      reset:
        name: "<white><bold> 主人更換時重置"
        description: |-
          <gray> 允許啟用在島嶼
          <gray> 更改所有者時強制將
          <gray> 生物群系更改為預設生物群系，
          <gray> 且新所有者不具有目前
          <gray> 生物群系權限。
        enabled: "<dark_green> 已啟用"
        disabled: "<red> 已停用"
      cool_down:
        name: "<white><bold> 生物群系冷卻時間"
        description: |-
          <gray> 允許設定秒數
          <gray> 玩家可以再次
          <gray> 更改生物群系之間。
        value: "<gray> 目前冷卻時間: <yellow> [number]"
        disabled: "<yellow> 冷卻時間已停用。"
      default_size:
        name: "<white><bold> 預設範圍"
        description: |-
          <gray> 允許設定數字
          <gray> 在玩家更改生物群系
          <gray> 而不寫入時使用。
        value: "<gray> 預設範圍: <yellow> [number]"
      default_mode:
        name: "<white><bold> 預設更新模式"
        description: |-
          <gray> 允許設定當玩家
          <gray> 未提供時的預設
          <gray> 更新模式。
        enabled: "<dark_green>"
        disabled: "<red>"
      unlock_notify:
        name: "<white><bold> 解鎖時通知"
        description: |-
          <gray> 當使用者解鎖
          <gray> 新生物群系時，
          <gray> 將向其發送訊息。
        enabled: |-
          <aqua> 解鎖時通知為 <green> 已啟用 <aqua>。
        disabled: |-
          <aqua> 解鎖時通知為 <red> 已停用 <aqua>。
      change_timeout:
        name: "<white><bold> 更改超時"
        description: |-
          <gray> 允許設定幾分鐘
          <gray> 後生物群系更新
          <gray> 將被終止。
          <gray> 在非常大的島嶼或
          <gray> 載入量很大的伺服器上可能發生。
        value: "<gray> 超時於: <yellow> [number] 分"
      parallel_updates:
        name: "<white><bold> 並行更新"
        description: |-
          <gray> 允許設定多少
          <gray> 生物群系更新可能
          <gray> 同時發生。其他的
          <gray> 將被放入隊列。
        value: |-
          <gray> 目前值: <yellow>[number]<gray>。
      use_bank:
        name: "<white><bold> 使用銀行帳戶"
        description: |-
          <gray> 切換所有由 Biomes
          <gray> 插件進行的付款是否
          <gray> 將使用銀行插件
          <gray> 島嶼帳戶。
        enabled: |-
          <aqua> 使用銀行帳戶 <green> 已啟用 <aqua>。
        disabled: |-
          <aqua> 使用銀行帳戶 <red> 已停用 <aqua>。
        missing: |-
          <red> 未安裝銀行插件。
      visibility:
        name: "<white><bold> 生物群系可見性"
        description: |-
          <gray> 允許更改玩家生物群系
          <gray> 在生物群系選擇面板中
          <gray> 的可見性。
        enabled: "<dark_green>"
        disabled: "<red>"
        all: "所有生物群系"
        deployed: "已部署生物群系"
        accessible: "可存取生物群系"
        toggleable: "可切換"
      is_online:
        name: "<white><bold> 線上玩家島嶼"
        description: |-
          <gray> 列出所有至少有一名
          <gray> 成員在線的島嶼。
      all_islands:
        name: "<white><bold> 所有島嶼"
        description: |-
          <gray> 目前遊戲模式中
          <gray> 建立的所有島嶼
          <gray> 的列表。
      island_name:
        name: "<white><bold> [name]"
        island-owner: "[player]"
        unknown: "<red> 未知所有者"
        description: |-
          [owner]
          [members]
          [id]
        owner: "<gray> 所有者: <yellow> [player]"
        title: "<gray> 島嶼成員:"
        element: " <gray> - <yellow> [player]"
      change_biome:
        name: "<white><bold> 更改生物群系"
        description: |-
          <gray> 按島嶼更改生物群系。
      manage_data:
        name: "<white><bold> 管理島嶼資料"
        description: |-
          <gray> 管理為特定
          <gray> 島嶼儲存的資料。
      clear_data:
        name: "<white><bold> 清除島嶼資料"
        description: |-
          <gray> 清除為
          <gray> 島嶼儲存的所有資料。
      island_bundle:
        name: "<white><bold> 島嶼套件"
        description: |-
          <gray> 指派給目前
          <gray> 島嶼的套件。只有
          <gray> 來自此套件的生物群系
          <gray> 可以在島嶼上使用。
        value: "<aqua> 套件: [bundle]"
        overwritten: |-
          <red> 所有者具有覆蓋
          <red> 套件的權限。
      owner_bundle:
        name: "<white><bold> 所有者套件"
        description: |-
          <gray> 指派給目前島嶼
          <gray> 所有者的套件。只有
          <gray> 來自此套件的生物群系
          <gray> 可以在島嶼上使用。
          <gray> 給使用者指派的權限:
          <gray><italic> '[gamemode].biomes.
          <gray><italic> bundle.<bundle-id>'
        value: "<aqua> 套件: [bundle]"
      reset_to_default:
        name: "<white><bold> 重置為預設值"
        description: |-
          <gray> 將所有島嶼值重置
          <gray> 為設定中的預設值。
      bundle_info:
        name: "<white><bold> 常規資訊"
        description: |-
          <gray> 檢視常規套件
          <gray> 資訊。
      bundle_biomes:
        name: "<white><bold> 管理生物群系"
        description: |-
          <gray> 管理指派給套件
          <gray> 的生物群系。
      bundle_name:
        name: "<white><bold> 更改名稱"
        description: |-
          <gray> 更改套件顯示名稱。
        value: "<yellow> 目前值: <reset> [bundle]"
      bundle_icon:
        name: "<white><bold> 更改圖示"
        description: |-
          <gray> 更改套件圖示。
      bundle_description:
        name: "<white><bold> 更改描述"
        description: |-
          <gray> 更改套件描述。
        value: "<yellow> 目前值:"
        none: "<red> 無描述"
      bundle_permission:
        name: "<white><bold> 套件權限"
        description: |-
          <gray> 必須添加到使用者
          <gray> 的權限
          <gray> 以強制此套件。
        value: "<yellow> 權限: <white> [gamemode].biomes.bundle.[id]"
      add_bundle_biome:
        name: "<white><bold> 新增生物群系"
        description: |-
          <gray> 將生物群系指派
          <gray> 到此套件。
        title: "<aqua> 選定的生物群系:"
        value: "<aqua> - [biome]"
      remove_bundle_biome:
        name: "<white><bold> 移除生物群系"
        description: |-
          <gray> 從此套件移除
          <gray> 生物群系。
        title: "<aqua> 選定的生物群系:"
        value: "<aqua> - [biome]"
      create_bundle:
        name: "<white><bold> 建立套件"
        description: |-
          <gray> 為此遊戲模式
          <gray> 建立新套件。
      delete_bundle:
        name: "<white><bold> 移除套件"
        description: |-
          <gray> 從此遊戲模式
          <gray> 完全移除套件。
        title: "<aqua> 選定的套件:"
        value: "<aqua> - [bundle]"
      download:
        name: "<white><bold> 下載"
        description: |-
          <gray> 下載網路資料庫。
        enabled: "<dark_green> 清除快取"
        disabled: "<red> 不清除快取"
    tips:
      click-to-filter: "<yellow> 按一下 <gray> 以篩選。"
      click-to-manage: "<yellow> 按一下 <gray> 以管理。"
      click-to-clear: "<yellow> 按一下 <gray> 以清除。"
      click-to-change-biome: "<yellow> 按一下 <gray> 以更改生物群系。"
      click-to-view: "<yellow> 按一下 <gray> 以檢視。"
      click-to-select: "<yellow> 按一下 <gray> 以選擇。"

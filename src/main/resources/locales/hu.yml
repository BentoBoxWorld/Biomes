biomes:
  commands:
    # Ez a rész csak az adminisztrátor parancsok fordítását tartalmazza.
    admin:
      main:
        description: "fő biómák adminisztrátori parancsa"
      import:
        parameters: "<file>"
        description: "biómákat importál"
        confirmation: "Ez eltávolítja a [gamemode] meglévő biómáit és az új biómákat a sablonfájlból importálja - kérjük, erősítse meg"
      migrate:
        description: "a biómák tárolt adatait az új formátumba migrálják"
      set:
        description: "megváltoztatja a játékos biómáját"
        parameters: "<player> <biome-id> [mode] [size]"
      unlock:
        description: "feloldja a biómáját a játékos számára ellenőrzések nélkül. A végén a 'true' hozzáadása meg fogja jelölni vásároltként."
        parameters: "<player> <biome-id> [true]"
      clear-queue:
        description: "törli a biómák frissítési sorát"
    # Ez a rész csak a játékos parancsok fordítását tartalmazza.
    player:
      main:
        description: "megnyitja a biómák kiválasztási GUI-t"
      set:
        description: "megváltoztatja a játékos biómáját"
        parameters: "<biome-id> [mode] [size]"
      buy:
        description: "megvásárol egy biómát"
        parameters: "<biome-id>"
      info:
        description: "csevegési üzenetet küld a bióma részletes leírásával"
        parameters: "<biome-id>"
  gui:
    titles:
      player-panel: "<black><bold> Válassz biómát"
      buy-panel: "<black><bold> Bióma vásárlása"
      advanced-panel: "<black><bold> Frissítési mód"
      # Az alábbi összes cím az adminisztrátor menükhöz tartozik.
      admin-panel: "<black><bold> Admin GUI"
      settings: "<black><bold> Beállítások"
      library: "<black><bold> Könyvtár"
      manage-biomes: "<black><bold> Biómák kezelése"
      manage-bundles: "<black><bold> Csomagok kezelése"
      manage-islands: "<black><bold> Szigetek adatainak kezelése"
      edit-biome: "<black><bold> Bióma szerkesztése: [biome]"
      edit-bundle: "<black><bold> Csomag szerkesztése: [bundle]"
      edit-island: "<black><bold> Sziget szerkesztése: [island]"
      environment-selector: "<black><bold> Dimenzió kiválasztása"
      biome-selector: "<black><bold> Bióma kiválasztása"
      bundle-selector: "<black><bold> Csomag kiválasztása"
      item-selector: "<black><bold> Elemek kiválasztása"
    buttons:
      island:
        name: "<white><bold> Sziget"
        description: |-
          <gray> Megváltoztatja a biómáját az
          <gray> egész szigeten.
      chunk:
        name: "<white><bold> Chunk"
        description: |-
          <gray> Megváltoztatja a biómáját
          <gray> chunkokban.
      range:
        name: "<white><bold> Tartomány"
        description: |-
          <gray> Megváltoztatja a biómáját
          <gray> tartomány szerint.
      reduce:
        name: "<white><bold> Csökkentés"
        description: |-
          <gray> Csökkentés [number]-vel
      increase:
        name: "<white><bold> Növelés"
        description: |-
          <gray> Növelés [number]-vel
      accept:
        name: "<white><bold> Változtatás alkalmazása"
        description: |-
          <gray> Megváltoztatja a biómáját erre: <yellow> [biome]

          <gray> Frissítési mód: <yellow> [mode]
          <gray> Frissítési tartomány: <yellow> [number]
      return:
        name: "<white><bold> Vissza"
        description: |-
          <gray> Vissza az előző menübe.
      previous:
        name: "<white><bold> Előző oldal"
        description: |-
          <gray> Váltás a <yellow> [number] <gray> oldalra
      next:
        name: "<white><bold> Következő oldal"
        description: |-
          <gray> Váltás a <yellow> [number] <gray> oldalra
      quit:
        name: "<white><bold> Kilépés"
        description: |-
          <gray> Kilépés a GUI-ból.
      save:
        name: "<white><bold> Mentés"
        description: |-
          <gray> Módosítások mentése és visszalépés.
      cancel:
        name: "<white><bold> Mégse"
        description: |-
          <gray> Módosítások visszavonása és visszalépés.
      search:
        name: "<white><bold> Keresés"
        description: |-
          <gray> Lehetővé teszi egy
          <gray> elemnek a keresését a beírt
          <gray> szöveges érték alapján.

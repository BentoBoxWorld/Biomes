      manage_biomes:
        name: "<white><bold> Biómák kezelése"
        description: |-
          <gray> Lehetővé teszi a biómák
          <gray> adatainak kezelését.
      manage_bundles:
        name: "<white><bold> Csomagok kezelése"
        description: |-
          <gray> Lehetővé teszi a csomagok
          <gray> adatainak kezelését.
      settings:
        name: "<white><bold> Beállítások"
        description: |-
          <gray> Lehetővé teszi néhány
          <gray> bővítmény beállításának módosítását.

biomes:
  commands:
    # This section contains only admin commands translations.
    admin:
      main:
        description: "lệnh admin biomes chính"
      import:
        parameters: "<file>"
        description: "nhập các biome"
        confirmation: "Điều này sẽ loại bỏ các biome hiện có từ [gamemode] và nhập các biome mới từ tệp mẫu - vui lòng xác nhận"
      migrate:
        description: "di chuyển dữ liệu lưu trữ biome sang định dạng mới"
      set:
        description: "thay đổi biome cho người chơi"
        parameters: "<player> <biome-id> [mode] [size]"
      unlock:
        description: "mở khóa biome cho người chơi mà không cần kiểm tra. Thêm `true` ở cuối sẽ đánh dấu nó là đã mua."
        parameters: "<player> <biome-id> [true]"
      clear-queue:
        description: "xóa hàng đợi cập nhật biome"
    # This section contains only player commands translations.
    player:
      main:
        description: "mở giao diện chọn biome"
      set:
        description: "thay đổi biome cho người chơi"
        parameters: "<biome-id> [mode] [size]"
      buy:
        description: "mua biome được yêu cầu"
        parameters: "<biome-id>"
      info:
        description: "gửi tin nhắn trò chuyện với mô tả chi tiết biome"
        parameters: "<biome-id>"
  gui:
    titles:
      player-panel: "<black><bold> Chọn Biome"
      buy-panel: "<black><bold> Mua Biome"
      advanced-panel: "<black><bold> Chế Độ Cập Nhật"
      admin-panel: "<black><bold> Giao Diện Admin"
      settings: "<black><bold> Cài Đặt"
      library: "<black><bold> Thư Viện"
      manage-biomes: "<black><bold> Quản Lý Biome"
      manage-bundles: "<black><bold> Quản Lý Gói"
      manage-islands: "<black><bold> Quản Lý Dữ Liệu Đảo"
      edit-biome: "<black><bold> Chỉnh Sửa Biome: [biome]"
      edit-bundle: "<black><bold> Chỉnh Sửa Gói: [bundle]"
      edit-island: "<black><bold> Chỉnh Sửa Đảo: [island]"
      environment-selector: "<black><bold> Chọn Môi Trường"
      biome-selector: "<black><bold> Chọn Biome"
      bundle-selector: "<black><bold> Chọn Gói"
      item-selector: "<black><bold> Chọn Mục"
    buttons:
      island:
        name: "<white><bold> Đảo"
        description: |-
          <gray> Thay đổi biome trên toàn bộ
          <gray> đảo.
      chunk:
        name: "<white><bold> Khối"
        description: |-
          <gray> Thay đổi biome trong các khối.
      range:
        name: "<white><bold> Phạm Vi"
        description: |-
          <gray> Thay đổi biome theo phạm vi.
      reduce:
        name: "<white><bold> Giảm"
        description: |-
          <gray> Giảm bởi <yellow> [number]
      increase:
        name: "<white><bold> Tăng"
        description: |-
          <gray> Tăng bởi <yellow> [number]
      accept:
        name: "<white><bold> Áp Dụng Thay Đổi"
        description: |-
          <gray> Thay đổi biome thành <yellow> [biome]

          <gray> Chế độ cập nhật: <yellow> [mode]
          <gray> Phạm vi cập nhật: <yellow> [number]
      return:
        name: "<white><bold> Quay Lại"
        description: |-
          <gray> Quay lại menu trước đó.
      previous:
        name: "<white><bold> Trang Trước"
        description: |-
          <gray> Chuyển đến trang <yellow> [number] <gray>
      next:
        name: "<white><bold> Trang Tiếp"
        description: |-
          <gray> Chuyển đến trang <yellow> [number] <gray>
      quit:
        name: "<white><bold> Thoát"
        description: |-
          <gray> Thoát khỏi giao diện.
      save:
        name: "<white><bold> Lưu"
        description: |-
          <gray> Lưu các thay đổi và quay lại.
      cancel:
        name: "<white><bold> Hủy"
        description: |-
          <gray> Hủy các thay đổi và quay lại.
      search:
        name: "<white><bold> Tìm Kiếm"
        description: |-
          <gray> Cho phép tìm kiếm một
          <gray> phần tử với giá trị
          <gray> văn bản nhập vào.
        search: "<aqua> Giá Trị: [value]"
      buy:
        name: "<white><bold> Mua"
        description: |-
          <gray> Mua một biome mới.
      manage_islands:
        name: "<white><bold> Quản Lý Đảo"
        description: |-
          <gray> Cho phép quản lý dữ liệu
          <gray> đảo.
      manage_biomes:
        name: "<white><bold> Quản Lý Biome"
        description: |-
          <gray> Cho phép quản lý dữ liệu
          <gray> biome.
      manage_bundles:
        name: "<white><bold> Quản Lý Gói"
        description: |-
          <gray> Cho phép quản lý dữ liệu
          <gray> gói.
      settings:
        name: "<white><bold> Cài Đặt"
        description: |-
          <gray> Cho phép thay đổi một số
          <gray> cài đặt của addon.
      import_template:
        name: "<white><bold> Nhập Mẫu"
        description: |-
          <gray> Nhập tệp mẫu
          <gray> nằm bên trong thư mục
          <gray> addon.
      web_library:
        name: "<white><bold> Thư Viện Web"
        description: |-
          <gray> Truy cập thư viện web
          <gray> chứa các biome
          <gray> được chia sẻ.
      export_from_database:
        name: "<white><bold> Xuất Cơ Sở Dữ Liệu"
        description: |-
          <gray> Xuất cơ sở dữ liệu
          <gray> vào một tệp duy nhất nằm trong
          <gray> thư mục addon.
      import_to_database:
        name: "<white><bold> Nhập Cơ Sở Dữ Liệu"
        description: |-
          <gray> Nhập cơ sở dữ liệu từ
          <gray> một tệp nằm trong thư mục
          <gray> addon.
      wipe_islands_data:
        name: "<white><bold> Xóa Cơ Sở Dữ Liệu Đảo"
        description: |-
          <gray> Xóa tất cả dữ liệu người dùng biome
          <gray> cho chế độ trò chơi này.
      wipe_biomes_data:
        name: "<white><bold> Xóa Cơ Sở Dữ Liệu Biome"
        description: |-
          <gray> Xóa tất cả dữ liệu biome và gói
          <gray> cho chế độ trò chơi này.
      add_biome:
        name: "<white><bold> Thêm Biome"
        description: |-
          <gray> Tạo Biome mới mà
          <gray> người chơi có thể sử dụng bằng cách
          <gray> sử dụng các panel người dùng.
      remove_biome:
        name: "<white><bold> Loại Bỏ Biome"
        description: |-
          <gray> Loại bỏ các biome được chọn
          <gray> khỏi các panel người dùng.
        title: "<yellow> Biome Đã Chọn:"
        value: "<yellow> - [biome]"
      accept_selected:
        name: "<white><bold> Chấp Nhận Đã Chọn"
        description: |-
          <gray> Chấp nhận các phần tử đã chọn.
        title: "<yellow> Phần Tử Đã Chọn:"
        element: "<yellow> - [element]"
      environment_element:
        name: "<white><bold> [environment]"
        description: |-
          <gray> [description].
      properties:
        name: "<white><bold> Thuộc Tính"
        description: |-
          <gray> Xem các thuộc tính biome chính.
      change_properties:
        name: "<white><bold> Thay Đổi Thuộc Tính"
        description: |-
          <gray> Xem các thuộc tính thay đổi biome.
      unlock_properties:
        name: "<white><bold> Thuộc Tính Mở Khóa"
        description: |-
          <gray> Xem các thuộc tính mở khóa biome.
      biome:
        name: "<white><bold> [biome]"
        description: |-
          <gray> Loại Biome Minecraft.
        value: "<gray> ID Biome: <yellow> [id]"
      name:
        name: "<white><bold> Tên Hiển Thị"
        description: |-
          <gray> Tên hiển thị cho biome.
          <gray> Hỗ trợ mã màu.
        value: "<gray> Giá Trị Hiện Tại: <reset> [name]"
      deployed:
        name: "<white><bold> Được Triển Khai"
        description: |-
          <gray> Chuyển đổi nếu biome
          <gray> có thể truy cập được cho
          <gray> người chơi hoặc không.
        enabled: "<dark_green> Bật"
        disabled: "<red> Tắt"
      environment:
        name: "<white><bold> Thứ Nguyên"
        description: |-
          <gray> Cho phép giới hạn trong
          <gray> thứ nguyên nào mà biome
          <gray> có thể được áp dụng.
        enabled: "<dark_green>"
        disabled: "<red>"
      icon:
        name: "<white><bold> Biểu Tượng"
        description: |-
          <gray> Cho phép thay đổi biểu tượng
          <gray> cho biome này.
      order:
        name: "<white><bold> Thứ Tự"
        description: |-
          <gray> Cho phép thay đổi thứ tự của
          <gray> các đối tượng.
          <gray> Các đối tượng có số bằng nhau
          <gray> sẽ được sắp xếp theo tên
          <gray> id duy nhất của chúng.
        value: "<gray> Thứ tự hiện tại: <yellow> [number]"
      description:
        name: "<white><bold> Mô Tả"
        description: |-
          <gray> Mô tả cụ thể
          <gray> cho biome. Mã màu
          <gray> phải được áp dụng cho nó.
        value: "<yellow> Mô tả hiện tại:"
        none: "<gray> Mô tả chưa được đặt."
      unlock_permissions:
        name: "<white><bold> Quyền Hạn"
        description: |-
          <gray> Cho phép thay đổi các quyền
          <gray> mở khóa cho biome này
          <gray> để có thể truy cập.
        title: "<yellow> Quyền Hạn: "
        element: " <dark_gray> - [permission]"
        none: "<gray> Quyền hạn chưa được đặt."
      unlock_cost:
        name: "<white><bold> Chi Phí"
        description: |-
          <gray> Cho phép thay đổi chi phí của
          <gray> mở khóa biome này.
        value: "<gray> Chi phí hiện tại: <yellow> [number]"
      unlock_items:
        name: "<white><bold> Mục"
        description: |-
          <gray> Cho phép thay đổi các mục
          <gray> mở khóa cho biome này.
        title: "<yellow> Mục: "
        element: " <dark_gray> - [number]x[item]"
        none: "<gray> Mục chưa được đặt."
      unlock_level:
        name: "<white><bold> Cấp Độ"
        description: |-
          <gray> Cho phép thay đổi cấp độ
          <gray> đảo cần thiết
          <gray> để mở khóa biome này.
        value: "<gray> Cấp độ hiện tại: <yellow> [number]"
      change_cost:
        name: "<white><bold> Chi Phí"
        description: |-
          <gray> Cho phép thay đổi chi phí của
          <gray> việc áp dụng biome này.
        value: "<gray> Chi phí hiện tại: <yellow> [number]"
      change_items:
        name: "<white><bold> Mục"
        description: |-
          <gray> Cho phép thay đổi các mục
          <gray> để áp dụng biome này.
        title: "<yellow> Mục: "
        element: " <dark_gray> - [number]x[item]"
        none: "<gray> Mục chưa được đặt."
      change_type:
        name: "<white><bold> [type]"
        description: |-
          <gray> Cho phép thay đổi loại chi phí
          <gray> để áp dụng biome này.
        static:
          name: "Giá Trị Tĩnh"
          description: |-
            <gray> Chi phí thay đổi biome không
            <gray> thay đổi.
        per_block:
          name: "Trên Mỗi Khối"
          description: |-
            <gray> Chi phí thay đổi biome được
            <gray> tính trên mỗi khối.
        per_usage:
          name: "Trên Mỗi Lần Sử Dụng"
          description: |-
            <gray> Chi phí thay đổi biome
            <gray> tăng lên sau mỗi lần
            <gray> sử dụng.
        enabled: "<dark_green>"
        disabled: "<red>"
      change_increment:
        name: "<white><bold> Gia Tăng"
        description: |-
          <gray> Cho phép thay đổi
          <gray> gia tăng trên mỗi lần sử dụng.
        value: "<gray> Giá trị hiện tại: <yellow> [number]"
      biome-filter:
        name: "<white><bold> [filter]"
        description: |-
          <gray> Bộ Lọc Biome dựa trên
          <gray> Minecraft Wiki.
        lush: "Biome Xanh Tươi"
        dry: "Biome Khô Cằn"
        cold: "Biome Lạnh"
        snowy: "Biome Tuyết"
        aquatic: "Biome Đại Dương"
        nether: "Biome Nether"
        the_end: "Biome The End"
        neutral: "Biome Trung Lập"
        unused: "Biome Chưa Sử Dụng"
        warm: "Biome Ấm Áp"
        cave: "Biome Hang Động"
        temperate: "Biome Ôn Hòa"
      protection_range:
        name: "<white><bold> Phạm Vi Bảo Vệ"
        description: |-
          <gray> Cho phép giới hạn việc thay đổi
          <gray> biome chỉ trong phạm vi bảo vệ
          <gray> đảo thay vì thay đổi biome trên
          <gray> toàn bộ đảo.
        enabled: "<dark_green> Bật"
        disabled: "<red> Tắt"
      reset:
        name: "<white><bold> Đặt Lại Khi Thay Đổi Chủ Sở Hữu"
        description: |-
          <gray> Cho phép bật việc buộc thay đổi
          <gray> biome thành biome mặc định,
          <gray> nếu đảo thay đổi chủ sở hữu
          <gray> và chủ sở hữu mới không có
          <gray> quyền hạn biome hiện tại.
        enabled: "<dark_green> Bật"
        disabled: "<red> Tắt"
      cool_down:
        name: "<white><bold> Biome Hạ Nhiệt"
        description: |-
          <gray> Cho phép đặt số giây
          <gray> giữa mỗi lần người chơi
          <gray> có thể thay đổi biome lại.
        value: "<gray> Hạ nhiệt hiện tại: <yellow> [number]"
        disabled: "<yellow> Hạ nhiệt bị vô hiệu hóa."
      default_size:
        name: "<white><bold> Phạm Vi Mặc Định"
        description: |-
          <gray> Cho phép đặt số sẽ được sử dụng
          <gray> khi người chơi thay đổi biome
          <gray> mà không viết nó.
        value: "<gray> Phạm Vi Mặc Định: <yellow> [number]"
      default_mode:
        name: "<white><bold> Chế Độ Cập Nhật Mặc Định"
        description: |-
          <gray> Cho phép đặt chế độ cập nhật
          <gray> mặc định khi người chơi
          <gray> không cung cấp nó.
        enabled: "<dark_green>"
        disabled: "<red>"
      unlock_notify:
        name: "<white><bold> Thông Báo Khi Mở Khóa"
        description: |-
          <gray> Một tin nhắn sẽ được gửi
          <gray> cho người dùng khi họ mở khóa
          <gray> một biome mới.
        enabled: |-
          <aqua> Thông báo khi mở khóa là <green> bật <aqua>.
        disabled: |-
          <aqua> Thông báo khi mở khóa là <red> tắt <aqua>.
      change_timeout:
        name: "<white><bold> Hết Thời Gian Cho Thay Đổi"
        description: |-
          <gray> Cho phép đặt sau bao nhiêu
          <gray> phút việc cập nhật biome
          <gray> sẽ bị chấm dứt.
          <gray> Có thể xảy ra trên các đảo
          <gray> rất lớn hoặc máy chủ chịu
          <gray> tải rất lớn.
        value: "<gray> Hết thời gian sau: <yellow> [number] phút"
      parallel_updates:
        name: "<white><bold> Cập Nhật Song Song"
        description: |-
          <gray> Cho phép đặt có bao nhiêu biome
          <gray> cập nhật có thể xảy ra cùng
          <gray> một lúc.
          <gray> Những cái khác sẽ được đặt vào
          <gray> hàng đợi.
        value: |-
          <gray> Giá trị hiện tại: <yellow>[number]<gray>.
      use_bank:
        name: "<white><bold> Sử Dụng Tài Khoản Ngân Hàng"
        description: |-
          <gray> Chuyển đổi nếu tất cả các
          <gray> khoản thanh toán được thực hiện
          <gray> bởi addon Biomes sẽ sử dụng
          <gray> tài khoản đảo Ngân Hàng Addon.
        enabled: |-
          <aqua> Sử dụng Tài Khoản Ngân Hàng là <green> bật <aqua>.
        disabled: |-
          <aqua> Sử dụng Tài Khoản Ngân Hàng là <red> tắt <aqua>.
        missing: |-
          <red> Addon Ngân Hàng chưa được cài đặt.
      visibility:
        name: "<white><bold> Khả Năng Hiển Thị Biome"
        description: |-
          <gray> Cho phép thay đổi khả năng
          <gray> hiển thị biome của người chơi
          <gray> trong các panel lựa chọn biome.
        enabled: "<dark_green>"
        disabled: "<red>"
        all: "Tất Cả Biome"
        deployed: "Biome Được Triển Khai"
        accessible: "Biome Có Thể Truy Cập"
        toggleable: "Có Thể Chuyển Đổi"
      is_online:
        name: "<white><bold> Đảo Người Chơi Trực Tuyến"
        description: |-
          <gray> Liệt kê tất cả các đảo có
          <gray> bất kỳ thành viên nào trực tuyến.
      all_islands:
        name: "<white><bold> Tất Cả Đảo"
        description: |-
          <gray> Danh sách tất cả các đảo
          <gray> được tạo trong chế độ trò chơi
          <gray> hiện tại.
      island_name:
        name: "<white><bold> [name]"
        island-owner: "[player]"
        unknown: "<red> Chủ Sở Hữu Không Xác Định"
        description: |-
          [owner]
          [members]
          [id]
        owner: "<gray> Chủ Sở Hữu: <yellow> [player]"
        title: "<gray> Thành Viên Đảo:"
        element: " <gray> - <yellow> [player]"
      change_biome:
        name: "<white><bold> Thay Đổi Biome"
        description: |-
          <gray> Thay đổi biome trên từng đảo.
      manage_data:
        name: "<white><bold> Quản Lý Dữ Liệu Đảo"
        description: |-
          <gray> Quản lý dữ liệu được
          <gray> lưu trữ cho đảo cụ thể.
      clear_data:
        name: "<white><bold> Xóa Dữ Liệu Đảo"
        description: |-
          <gray> Xóa tất cả dữ liệu được lưu trữ
          <gray> cho đảo.
      island_bundle:
        name: "<white><bold> Gói Đảo"
        description: |-
          <gray> Gói được gán cho
          <gray> đảo hiện tại.
          <gray> Chỉ các biome từ gói này
          <gray> mới có thể được sử dụng
          <gray> trên đảo.
        value: "<aqua> Gói: [bundle]"
        overwritten: |-
          <red> Chủ sở hữu có quyền hạn
          <red> ghi đè gói.
      owner_bundle:
        name: "<white><bold> Gói Chủ Sở Hữu"
        description: |-
          <gray> Gói được gán cho
          <gray> chủ sở hữu đảo hiện tại.
          <gray> Chỉ các biome từ gói này
          <gray> mới có thể được sử dụng
          <gray> trên đảo.
          <gray> Quyền hạn cho người dùng để gán:
          <gray><italic> '[gamemode].biomes.
          <gray><italic> bundle.<bundle-id>'
        value: "<aqua> Gói: [bundle]"
      reset_to_default:
        name: "<white><bold> Đặt Lại Thành Mặc Định"
        description: |-
          <gray> Đặt lại tất cả các giá trị
          <gray> đảo thành các giá trị
          <gray> mặc định từ cài đặt.
      bundle_info:
        name: "<white><bold> Thông Tin Chung"
        description: |-
          <gray> Xem thông tin gói
          <gray> chung.
      bundle_biomes:
        name: "<white><bold> Quản Lý Biome"
        description: |-
          <gray> Quản lý các biome được gán
          <gray> cho gói.
      bundle_name:
        name: "<white><bold> Thay Đổi Tên"
        description: |-

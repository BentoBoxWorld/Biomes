biomes:
  commands:
    # Questa sezione contiene solo le traduzioni dei comandi admin.
    admin:
      main:
        description: "comando admin biomi principale"
      import:
        parameters: "<file>"
        description: "importa biomi"
        confirmation: "Questo rimuoverà i biomi [gamemode] esistenti e importerà i nuovi biomi dal file template - si prega di confermare"
      migrate:
        description: "migra i dati dei biomi immagazzinati al nuovo formato"
      set:
        description: "cambia il bioma del giocatore"
        parameters: "<player> <biome-id> [mode] [size]"
      unlock:
        description: "sblocca il bioma per il giocatore senza controlli. L'aggiunta di 'true' alla fine lo markerà come acquistato."
        parameters: "<player> <biome-id> [true]"
      clear-queue:
        description: "cancella la coda di aggiornamento dei biomi"
    # Questa sezione contiene solo le traduzioni dei comandi del giocatore.
    player:
      main:
        description: "apre la GUI di selezione dei biomi"
      set:
        description: "cambia il bioma del giocatore"
        parameters: "<biome-id> [mode] [size]"
      buy:
        description: "acquista il bioma richiesto"
        parameters: "<biome-id>"
      info:
        description: "invia un messaggio di chat con la descrizione dettagliata del bioma"
        parameters: "<biome-id>"
  gui:
    titles:
      player-panel: "<black><bold> Scegli Bioma"
      buy-panel: "<black><bold> Acquista Bioma"
      advanced-panel: "<black><bold> Modalità Aggiornamento"
      # Tutti i Titoli sotto questo commento sono per i Menu Admin.
      admin-panel: "<black><bold> GUI Admin"
      settings: "<black><bold> Impostazioni"
      library: "<black><bold> Libreria"
      manage-biomes: "<black><bold> Gestisci Biomi"
      manage-bundles: "<black><bold> Gestisci Bundle"
      manage-islands: "<black><bold> Gestisci Dati Isola"
      edit-biome: "<black><bold> Modifica Bioma: [biome]"
      edit-bundle: "<black><bold> Modifica Bundle: [bundle]"
      edit-island: "<black><bold> Modifica Isola: [island]"
      environment-selector: "<black><bold> Seleziona Ambiente"
      biome-selector: "<black><bold> Seleziona Bioma"
      bundle-selector: "<black><bold> Seleziona Bundle"
      item-selector: "<black><bold> Seleziona Oggetti"
    buttons:
      island:
        name: "<white><bold> Isola"
        description: |-
          <gray> Cambia il bioma su tutta
          <gray> l'isola.
      chunk:
        name: "<white><bold> Chunk"
        description: |-
          <gray> Cambia il bioma nei chunk.
      range:
        name: "<white><bold> Portata"
        description: |-
          <gray> Cambia il bioma per portata.
      reduce:
        name: "<white><bold> Riduci"
        description: |-
          <gray> Riduci di <yellow> [number]
      increase:
        name: "<white><bold> Aumenta"
        description: |-
          <gray> Aumenta di <yellow> [number]
      accept:
        name: "<white><bold> Applica Modifica"
        description: |-
          <gray> Cambia il bioma a <yellow> [biome]

          <gray> Modalità aggiornamento: <yellow> [mode]
          <gray> Portata aggiornamento: <yellow> [number]
      return:
        name: "<white><bold> Indietro"
        description: |-
          <gray> Torna al menu precedente.
      previous:
        name: "<white><bold> Pagina Precedente"
        description: |-
          <gray> Passa alla pagina <yellow> [number]
      next:
        name: "<white><bold> Pagina Successiva"
        description: |-
          <gray> Passa alla pagina <yellow> [number]
      quit:
        name: "<white><bold> Esci"
        description: |-
          <gray> Esci dalla GUI.
      save:
        name: "<white><bold> Salva"
        description: |-
          <gray> Salva le modifiche e torna.
      cancel:
        name: "<white><bold> Annulla"
        description: |-
          <gray> Annulla le modifiche e torna.
      search:
        name: "<white><bold> Cerca"
        description: |-
          <gray> Consente di cercare un
          <gray> elemento con valore di testo
          <gray> di input.
        search: "<aqua> Valore: [value]"
      buy:
        name: "<white><bold> Acquista"
        description: |-
          <gray> Acquista un nuovo bioma.
      manage_islands:
        name: "<white><bold> Gestisci Isole"
        description: |-
          <gray> Consente di gestire i dati
          <gray> dell'isola.
      manage_biomes:
        name: "<white><bold> Gestisci Biomi"
        description: |-
          <gray> Consente di gestire i dati
          <gray> dei biomi.
      manage_bundles:
        name: "<white><bold> Gestisci Bundle"
        description: |-
          <gray> Consente di gestire i dati
          <gray> dei bundle.
      settings:
        name: "<white><bold> Impostazioni"
        description: |-
          <gray> Consente di modificare
          <gray> alcune impostazioni del componente aggiuntivo.
      import_template:
        name: "<white><bold> Importa Template"
        description: |-
          <gray> Importa il file template
          <gray> situato dentro la cartella
          <gray> del componente aggiuntivo.
      web_library:
        name: "<white><bold> Libreria Web"
        description: |-
          <gray> Accedi alla libreria web
          <gray> che contiene biomi
          <gray> condivisi.
      export_from_database:
        name: "<white><bold> Esporta Database"
        description: |-
          <gray> Esporta il database in un
          <gray> singolo file situato nella
          <gray> cartella del componente aggiuntivo.
      import_to_database:
        name: "<white><bold> Importa Database"
        description: |-
          <gray> Importa un database da un
          <gray> file situato nella cartella
          <gray> del componente aggiuntivo.
      wipe_islands_data:
        name: "<white><bold> Cancella Database Isola"
        description: |-
          <gray> Cancella tutti i dati dei biomi dell'utente
          <gray> per questa modalità di gioco.
      wipe_biomes_data:
        name: "<white><bold> Cancella Database Biomi"
        description: |-
          <gray> Cancella tutti i biomi e i
          <gray> dati del bundle per questa modalità di gioco.
      add_biome:
        name: "<white><bold> Aggiungi Bioma"
        description: |-
          <gray> Crea un nuovo bioma che
          <gray> i giocatori possono usare usando
          <gray> i pannelli utente.
      remove_biome:
        name: "<white><bold> Rimuovi Bioma"
        description: |-
          <gray> Rimuove i biomi selezionati
          <gray> dai pannelli utente.
        title: "<yellow> Biomi Selezionati:"
        value: "<yellow> - [biome]"
      accept_selected:
        name: "<white><bold> Accetta Selezionati"
        description: |-
          <gray> Accetta gli elementi selezionati.
        title: "<yellow> Elementi Selezionati:"
        element: "<yellow> - [element]"
      environment_element:
        name: "<white><bold> [environment]"
        description: |-
          <gray> [description].
      properties:
        name: "<white><bold> Proprietà"
        description: |-
          <gray> Visualizza le proprietà principali del bioma.
      change_properties:
        name: "<white><bold> Modifica Proprietà"
        description: |-
          <gray> Visualizza le proprietà di modifica del bioma.
      unlock_properties:
        name: "<white><bold> Proprietà di Sblocco"
        description: |-
          <gray> Visualizza le proprietà di sblocco del bioma.
      biome:
        name: "<white><bold> [biome]"
        description: |-
          <gray> Tipo di bioma Minecraft.
        value: "<gray> ID Bioma: <yellow> [id]"
      name:
        name: "<white><bold> Nome Visualizzato"
        description: |-
          <gray> Nome visualizzato per il bioma.
          <gray> Supporta i codici colore.
        value: "<gray> Valore Attuale: <reset> [name]"
      deployed:
        name: "<white><bold> Distribuito"
        description: |-
          <gray> Attiva/disattiva se il bioma è
          <gray> accessibile ai giocatori
          <gray> o no.
        enabled: "<dark_green> Abilitato"
        disabled: "<red> Disabilitato"
      environment:
        name: "<white><bold> Dimensione"
        description: |-
          <gray> Consente di limitare in quale
          <gray> dimensione il bioma
          <gray> può essere applicato.
        enabled: "<dark_green>"
        disabled: "<red>"
      icon:
        name: "<white><bold> Icona"
        description: |-
          <gray> Consente di modificare l'icona
          <gray> per questo bioma.
      order:
        name: "<white><bold> Ordine"
        description: |-
          <gray> Consente di modificare l'ordine
          <gray> degli oggetti.
          <gray> Gli oggetti con numeri uguali
          <gray> verranno ordinati in base ai
          <gray> loro nomi id univoci.
        value: "<gray> Ordine attuale: <yellow> [number]"
      description:
        name: "<white><bold> Descrizione"
        description: |-
          <gray> La descrizione specifica
          <gray> per il bioma. I codici colore
          <gray> devono essere applicati ad esso.
        value: "<yellow> Descrizione attuale:"
        none: "<gray> Descrizione non impostata."
      unlock_permissions:
        name: "<white><bold> Permessi"
        description: |-
          <gray> Consente di modificare i
          <gray> permessi di sblocco per questo
          <gray> bioma per essere accessibile.
        title: "<yellow> Permessi: "
        element: " <dark_gray> - [permission]"
        none: "<gray> Permessi non impostati."
      unlock_cost:
        name: "<white><bold> Costo"
        description: |-
          <gray> Consente di modificare il costo di
          <gray> sblocco di questo bioma.
        value: "<gray> Costo attuale: <yellow> [number]"
      unlock_items:
        name: "<white><bold> Oggetti"
        description: |-
          <gray> Consente di modificare gli oggetti di
          <gray> sblocco per questo bioma.
        title: "<yellow> Oggetti: "
        element: " <dark_gray> - [number]x[item]"
        none: "<gray> Oggetti non impostati."
      unlock_level:
        name: "<white><bold> Livello"
        description: |-
          <gray> Consente di modificare il
          <gray> livello dell'isola richiesto
          <gray> per lo sblocco di questo bioma.
        value: "<gray> Livello attuale: <yellow> [number]"
      change_cost:
        name: "<white><bold> Costo"
        description: |-
          <gray> Consente di modificare il costo di
          <gray> applicazione di questo bioma.
        value: "<gray> Costo attuale: <yellow> [number]"
      change_items:
        name: "<white><bold> Oggetti"
        description: |-
          <gray> Consente di modificare gli oggetti
          <gray> per l'applicazione di questo bioma.
        title: "<yellow> Oggetti: "
        element: " <dark_gray> - [number]x[item]"
        none: "<gray> Oggetti non impostati."
      change_type:
        name: "<white><bold> [type]"
        description: |-
          <gray> Consente di modificare il tipo di
          <gray> costo di applicazione del bioma.
        static:
          name: "Valore Statico"
          description: |-
            <gray> Il costo di modifica del bioma
            <gray> non cambia.
        per_block:
          name: "Per Blocco"
          description: |-
            <gray> Il costo di modifica del bioma è
            <gray> calcolato per blocco.
        per_usage:
          name: "Per Utilizzo"
          description: |-
            <gray> Il costo di modifica del bioma
            <gray> aumenta dopo ogni
            <gray> utilizzo.
        enabled: "<dark_green>"
        disabled: "<red>"
      change_increment:
        name: "<white><bold> Incremento"
        description: |-
          <gray> Consente di modificare
          <gray> l'incremento per utilizzo.
        value: "<gray> Valore attuale: <yellow> [number]"
      biome-filter:
        name: "<white><bold> [filter]"
        description: |-
          <gray> Filtro bioma basato su
          <gray> Minecraft Wiki.
        lush: "Biomi Lussureggianti"
        dry: "Biomi Secchi"
        cold: "Biomi Freddi"
        snowy: "Biomi Nevosi"
        aquatic: "Biomi Oceanici"
        nether: "Biomi Nether"
        the_end: "Biomi The End"
        neutral: "Biomi Neutrali"
        unused: "Biomi Inutilizzati"
        warm: "Biomi Caldi"
        cave: "Biomi Caverna"
        temperate: "Biomi Temperati"
      protection_range:
        name: "<white><bold> Portata di Protezione"
        description: |-
          <gray> Consente di limitare la modifica
          <gray> del bioma solo alla portata di
          <gray> protezione dell'isola invece di
          <gray> modificare il bioma su tutta l'isola.
        enabled: "<dark_green> Abilitato"
        disabled: "<red> Disabilitato"
      reset:
        name: "<white><bold> Ripristina al Cambio Proprietario"
        description: |-
          <gray> Consente di abilitare la modifica
          <gray> del bioma forzata a quella
          <gray> predefinita se l'isola cambia il suo
          <gray> proprietario.
        enabled: "<dark_green> Abilitato"
        disabled: "<red> Disabilitato"
      cool_down:
        name: "<white><bold> Raffreddamento Bioma"
        description: |-
          <gray> Consente di impostare il numero di
          <gray> secondi tra i quali il giocatore
          <gray> può modificare il bioma di nuovo.
        value: "<gray> Tempo di raffreddamento attuale: <yellow> [number]"
        disabled: "<yellow> Raffreddamento disabilitato."
      default_size:
        name: "<white><bold> Portata Predefinita"
        description: |-
          <gray> Consente di impostare il numero che
          <gray> verrà utilizzato quando il giocatore
          <gray> modifica il bioma senza
          <gray> scriverlo.
        value: "<gray> Portata Predefinita: <yellow> [number]"
      default_mode:
        name: "<white><bold> Modalità Aggiornamento Predefinita"
        description: |-
          <gray> Consente di impostare la modalità di
          <gray> aggiornamento predefinita quando i
          <gray> giocatori non l'hanno fornita.
        enabled: "<dark_green>"
        disabled: "<red>"
      unlock_notify:
        name: "<white><bold> Notifica su Sblocco"
        description: |-
          <gray> Un messaggio verrà inviato
          <gray> a un utente quando sblocca
          <gray> un nuovo bioma.
        enabled: |-
          <aqua> La notifica su sblocco è <green> abilitata <aqua>.
        disabled: |-
          <aqua> La notifica su sblocco è <red> disabilitata <aqua>.
      change_timeout:
        name: "<white><bold> Timeout per Modifica"
        description: |-
          <gray> Consente di impostare dopo quanti
          <gray> minuti l'aggiornamento del bioma
          <gray> verrà terminato.
          <gray> Può accadere su isole molto grandi
          <gray> o server sotto un carico
          <gray> enorme.
        value: "<gray> Timeout dopo: <yellow> [number] min"
      parallel_updates:
        name: "<white><bold> Aggiornamenti Paralleli"
        description: |-
          <gray> Consente di impostare quanti
          <gray> aggiornamenti del bioma possono
          <gray> accadere contemporaneamente.
          <gray> Gli altri verranno messi in coda.
        value: |-
          <gray> Valore attuale: <yellow>[number]<gray>.
      use_bank:
        name: "<white><bold> Usa Conto Bancario"
        description: |-
          <gray> Attiva/disattiva se tutti i pagamenti
          <gray> effettuati dal componente aggiuntivo
          <gray> Biomas utilizzeranno il conto
          <gray> dell'isola del componente aggiuntivo Banca.
        enabled: |-
          <aqua> L'utilizzo del conto bancario è <green> abilitato <aqua>.
        disabled: |-
          <aqua> L'utilizzo del conto bancario è <red> disabilitato <aqua>.
        missing: |-
          <red> Il componente aggiuntivo Banca non è installato.
      visibility:
        name: "<white><bold> Visibilità Bioma"
        description: |-
          <gray> Consente di modificare la
          <gray> visibilità del bioma del giocatore
          <gray> nei pannelli di selezione dei biomi.
        enabled: "<dark_green>"
        disabled: "<red>"

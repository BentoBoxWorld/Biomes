        value: "<yellow> Permesso: <white> [gamemode].biomes.bundle.[id]"
      add_bundle_biome:
        name: "<white><bold> Aggiungi Bioma"
        description: |-
          <gray> Assegna un bioma a
          <gray> questo bundle.
        title: "<aqua> Biomi Selezionati:"
        value: "<aqua> - [biome]"
      remove_bundle_biome:
        name: "<white><bold> Rimuovi Bioma"
        description: |-
          <gray> Rimuovi un bioma da
          <gray> questo bundle.
        title: "<aqua> Biomi Selezionati:"
        value: "<aqua> - [biome]"
      create_bundle:
        name: "<white><bold> Crea Bundle"
        description: |-
          <gray> Crea un nuovo bundle
          <gray> per questa modalità di gioco.
      delete_bundle:
        name: "<white><bold> Rimuovi Bundle"
        description: |-
          <gray> Rimuovi un bundle da
          <gray> questa modalità di gioco completamente.
        title: "<aqua> Bundle Selezionati:"
        value: "<aqua> - [bundle]"
      download:
        name: "<white><bold> Scarica"
        description: |-
          <gray> Scarica la libreria web.
        enabled: "<dark_green> Con Pulizia della Cache"
        disabled: "<red> Senza Pulizia della Cache"

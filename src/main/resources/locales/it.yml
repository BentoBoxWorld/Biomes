      bundle_biomes:
        name: "<white><bold> Gestisci Biomi"
        description: |-
          <gray> Gestisci i biomi che sono
          <gray> assegnati al bundle.
      bundle_name:
        name: "<white><bold> Cambia Nome"
        description: |-
          <gray> Cambia il nome visualizzato
          <gray> del bundle.
        value: "<yellow> Valore Attuale: <reset> [bundle]"
      bundle_icon:
        name: "<white><bold> Cambia Icona"
        description: |-
          <gray> Cambia l'icona del bundle.
      bundle_description:
        name: "<white><bold> Cambia Descrizione"
        description: |-
          <gray> Cambia la descrizione del bundle.
        value: "<yellow> Valore attuale:"
        none: "<red> Nessuna descrizione"
      bundle_permission:
        name: "<white><bold> Permesso Bundle"

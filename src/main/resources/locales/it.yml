        title: "<gray> Membri Isola:"
        element: " <gray> - <yellow> [player]"
      change_biome:
        name: "<white><bold> Modifica Bioma"
        description: |-
          <gray> Modifica il bioma per isola.
      manage_data:
        name: "<white><bold> Gestisci Dati Isola"
        description: |-
          <gray> Gestisci i dati che sono
          <gray> memorizzati per l'isola specifica.
      clear_data:
        name: "<white><bold> Cancella Dati Isola"
        description: |-
          <gray> Cancella tutti i dati
          <gray> memorizzati per l'isola.
      island_bundle:
        name: "<white><bold> Bundle Isola"
        description: |-
          <gray> Bundle che è assegnato
          <gray> all'isola attuale.
          <gray> Solo i biomi di questo
          <gray> bundle possono essere usati
          <gray> sull'isola.
        value: "<aqua> Bundle: [bundle]"
        overwritten: |-
          <red> Il proprietario ha un permesso che
          <red> sovrascrive il bundle.
      owner_bundle:
        name: "<white><bold> Bundle Proprietario"
        description: |-
          <gray> Bundle che è assegnato al
          <gray> proprietario dell'isola attuale.
          <gray> Solo i biomi di questo
          <gray> bundle possono essere usati
          <gray> sull'isola.
          <gray> Permesso per l'utente di assegnare:
          <gray><italic> '[gamemode].biomes.
          <gray><italic> bundle.<bundle-id>'
        value: "<aqua> Bundle: [bundle]"
      reset_to_default:
        name: "<white><bold> Ripristina ai Valori Predefiniti"
        description: |-
          <gray> Ripristina tutti i valori
          <gray> dell'isola ai valori predefiniti

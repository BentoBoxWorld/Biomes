        dry: 乾燥バイオーム
        cold: 寒冷バイオーム
        snowy: 雪のバイオーム
        aquatic: 海洋バイオーム
        nether: ネザーバイオーム
        the_end: エンドバイオーム
        neutral: 中立バイオーム
        unused: 未使用のバイオーム
        warm: 温暖なバイオーム
        cave: 洞窟バイオーム
        temperate: 温帯バイオーム

        name: "<white><bold> 購入"
        description: "<gray> 新しいバイオームを購入します。"
      manage_islands:
        name: "<white><bold> 島の管理"
        description: "<gray> 島のデータを管理できます。"
      manage_biomes:
        name: "<white><bold> バイオームの管理"
        description: |-
          <gray> バイオームを管理できます

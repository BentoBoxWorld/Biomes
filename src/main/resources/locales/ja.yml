      next:
        name: "<white><bold> 次のページ"
        description: "<gray> <yellow> [number] <gray> ページに切り替える"
      quit:
        name: "<white><bold> 終了"
        description: "<gray> GUIを終了します。"
      save:
        name: "<white><bold> 保存"
        description: "<gray> 変更を保存して戻ります。"
      cancel:
        name: "<white><bold> キャンセル"
        description: "<gray> 変更をキャンセルして戻ります。"
      search:
        name: "<white><bold> 検索"

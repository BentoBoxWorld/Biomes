biomes:
  commands:
    # Bagian ini hanya berisi terjemahan perintah admin.
    admin:
      main:
        description: "perintah admin bioma utama"
      import:
        parameters: "<file>"
        description: "mengimpor bioma"
        confirmation: "Ini akan menghapus bioma [gamemode] yang ada dan mengimpor bioma baru dari file template - silakan konfirmasi"
      migrate:
        description: "melakukan migrasi data bioma yang disimpan ke format baru"
      set:
        description: "mengubah bioma untuk pemain"
        parameters: "<player> <biome-id> [mode] [size]"

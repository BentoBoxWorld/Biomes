biomes:
  commands:
    # Этот раздел содержит только переводы команд администратора.
    admin:
      main:
        description: "главная команда администратора биомов"
      import:
        parameters: "<file>"
        description: "импортирует биомы"
        confirmation: "Это удалит существующие биомы из [gamemode] и импортирует новые биомы из файла шаблона - пожалуйста подтвердите"
      migrate:
        description: "переносит сохраненные данные биомов в новый формат"
      set:
        description: "изменяет биом для игрока"
        parameters: "<player> <biome-id> [mode] [size]"
      unlock:
        description: "разблокирует биом для игрока без проверок. Добавление `true` в конце отметит как куплено."
        parameters: "<player> <biome-id> [true]"
      clear-queue:
        description: "очищает очередь обновления биома"
    # Этот раздел содержит только переводы команд игрока.
    player:
      main:
        description: "открывает графический интерфейс выбора биома"
      set:
        description: "изменяет биом для игрока"
        parameters: "<biome-id> [mode] [size]"
      buy:
        description: "покупает запрашиваемый биом"
        parameters: "<biome-id>"
      info:
        description: "отправляет сообщение в чат с подробным описанием биома"
        parameters: "<biome-id>"
  gui:
    titles:
      player-panel: "<black><bold> Выберите Биом"
      buy-panel: "<black><bold> Купить Биом"
      advanced-panel: "<black><bold> Режим Обновления"
      admin-panel: "<black><bold> Панель Администратора"
      settings: "<black><bold> Параметры"
      library: "<black><bold> Библиотека"
      manage-biomes: "<black><bold> Управление Биомами"
      manage-bundles: "<black><bold> Управление Наборами"
      manage-islands: "<black><bold> Управление Данными Островов"
      edit-biome: "<black><bold> Редактировать Биом: [biome]"
      edit-bundle: "<black><bold> Редактировать Набор: [bundle]"
      edit-island: "<black><bold> Редактировать Остров: [island]"
      environment-selector: "<black><bold> Выберите Среду"
      biome-selector: "<black><bold> Выберите Биом"
      bundle-selector: "<black><bold> Выберите Набор"
      item-selector: "<black><bold> Выберите Предметы"
    buttons:
      island:
        name: "<white><bold> Остров"
        description: |-
          <gray> Изменяет биом на всем
          <gray> острове.
      chunk:
        name: "<white><bold> Чанк"
        description: |-
          <gray> Изменяет биом по чанкам.
      range:
        name: "<white><bold> Радиус"
        description: |-
          <gray> Изменяет биом по радиусу.
      reduce:
        name: "<white><bold> Уменьшить"
        description: |-
          <gray> Уменьшить на <yellow> [number]
      increase:
        name: "<white><bold> Увеличить"
        description: |-
          <gray> Увеличить на <yellow> [number]
      accept:
        name: "<white><bold> Применить Изменение"
        description: |-
          <gray> Изменить биом на <yellow> [biome]

          <gray> Режим обновления: <yellow> [mode]
          <gray> Диапазон обновления: <yellow> [number]
      return:
        name: "<white><bold> Вернуться"
        description: |-
          <gray> Вернуться в предыдущее меню.
      previous:
        name: "<white><bold> Предыдущая Страница"
        description: |-
          <gray> Переключиться на страницу <yellow> [number]
      next:
        name: "<white><bold> Следующая Страница"
        description: |-
          <gray> Переключиться на страницу <yellow> [number]
      quit:
        name: "<white><bold> Выход"
        description: |-
          <gray> Выход из графического интерфейса.
      save:
        name: "<white><bold> Сохранить"
        description: |-
          <gray> Сохранить изменения и вернуться.
      cancel:
        name: "<white><bold> Отменить"
        description: |-
          <gray> Отменить изменения и вернуться.
      search:
        name: "<white><bold> Поиск"
        description: |-
          <gray> Позволяет искать
          <gray> элемент с вводимым
          <gray> текстовым значением.
        search: "<aqua> Значение: [value]"
      buy:
        name: "<white><bold> Купить"
        description: |-
          <gray> Купить новый биом.
      manage_islands:
        name: "<white><bold> Управление Островами"
        description: |-
          <gray> Позволяет управлять
          <gray> данными острова.
      manage_biomes:
        name: "<white><bold> Управление Биомами"
        description: |-
          <gray> Позволяет управлять
          <gray> данными биомов.
      manage_bundles:
        name: "<white><bold> Управление Наборами"
        description: |-
          <gray> Позволяет управлять
          <gray> данными наборов.
      settings:
        name: "<white><bold> Параметры"
        description: |-
          <gray> Позволяет изменять
          <gray> некоторые параметры дополнения.
      import_template:
        name: "<white><bold> Импортировать Шаблон"
        description: |-
          <gray> Импортировать файл шаблона
          <gray> расположенный в директории
          <gray> дополнения.
      web_library:
        name: "<white><bold> Веб-Библиотека"
        description: |-
          <gray> Получить доступ к веб-
          <gray> библиотеке, которая содержит
          <gray> общие биомы.
      export_from_database:
        name: "<white><bold> Экспортировать БД"
        description: |-
          <gray> Экспортировать базу данных
          <gray> в один файл, расположенный в
          <gray> директории дополнения.
      import_to_database:
        name: "<white><bold> Импортировать БД"
        description: |-
          <gray> Импортировать базу данных из
          <gray> файла, расположенного в
          <gray> директории дополнения.
      wipe_islands_data:
        name: "<white><bold> Очистить БД Островов"
        description: |-
          <gray> Очистить все данные биомов
          <gray> пользователя для этого режима игры.
      wipe_biomes_data:
        name: "<white><bold> Очистить БД Биомов"
        description: |-
          <gray> Очистить все данные биомов и наборов
          <gray> для этого режима игры.
      add_biome:
        name: "<white><bold> Добавить Биом"
        description: |-
          <gray> Создает новый Биом, который
          <gray> игроки могут использовать
          <gray> через пользовательские панели.
      remove_biome:
        name: "<white><bold> Удалить Биом"
        description: |-
          <gray> Удаляет выбранные биомы
          <gray> из пользовательских панелей.
        title: "<yellow> Выбранные Биомы:"
        value: "<yellow> - [biome]"
      accept_selected:
        name: "<white><bold> Принять Выбранное"
        description: |-
          <gray> Принимает выбранные элементы.
        title: "<yellow> Выбранные Элементы:"
        element: "<yellow> - [element]"
      environment_element:
        name: "<white><bold> [environment]"
        description: |-
          <gray> [description].
      properties:
        name: "<white><bold> Свойства"
        description: |-
          <gray> Просмотреть основные свойства биома.
      change_properties:
        name: "<white><bold> Изменить Свойства"
        description: |-
          <gray> Просмотреть изменяемые свойства биома.
      unlock_properties:
        name: "<white><bold> Разблокировать Свойства"
        description: |-
          <gray> Просмотреть свойства разблокировки биома.
      biome:
        name: "<white><bold> [biome]"
        description: |-
          <gray> Тип биома Minecraft.
        value: "<gray> ID Биома: <yellow> [id]"
      name:
        name: "<white><bold> Отображаемое Имя"
        description: |-
          <gray> Отображаемое имя для биома.
          <gray> Поддерживает коды цветов.
        value: "<gray> Текущее Значение: <reset> [name]"
      deployed:
        name: "<white><bold> Развернуто"
        description: |-
          <gray> Переключает доступность
          <gray> биома для игроков
          <gray> или нет.
        enabled: "<dark_green> Включено"
        disabled: "<red> Отключено"
      environment:
        name: "<white><bold> Измерение"
        description: |-
          <gray> Позволяет ограничить в каком
          <gray> измерении может быть применен
          <gray> биом.
        enabled: "<dark_green>"
        disabled: "<red>"
      icon:
        name: "<white><bold> Иконка"
        description: |-
          <gray> Позволяет изменить иконку
          <gray> для этого биома.
      order:
        name: "<white><bold> Порядок"
        description: |-
          <gray> Позволяет изменить порядок
          <gray> объектов.
          <gray> Объекты с равными числами
          <gray> будут отсортированы по их
          <gray> уникальным именам.
        value: "<gray> Текущий порядок: <yellow> [number]"
      description:
        name: "<white><bold> Описание"
        description: |-
          <gray> Конкретное описание
          <gray> для биома. Коды цветов
          <gray> должны быть применены к нему.
        value: "<yellow> Текущее описание:"
        none: "<gray> Описание не задано."
      unlock_permissions:
        name: "<white><bold> Разрешения"
        description: |-
          <gray> Позволяет изменять
          <gray> разрешения разблокировки для
          <gray> доступности этого биома.
        title: "<yellow> Разрешения: "
        element: " <dark_gray> - [permission]"
        none: "<gray> Разрешения не задано."
      unlock_cost:
        name: "<white><bold> Стоимость"
        description: |-
          <gray> Позволяет изменять стоимость
          <gray> разблокировки этого биома.
        value: "<gray> Текущая стоимость: <yellow> [number]"
      unlock_items:
        name: "<white><bold> Предметы"
        description: |-
          <gray> Позволяет изменять предметы
          <gray> разблокировки для этого биома.
        title: "<yellow> Предметы: "
        element: " <dark_gray> - [number]x[item]"
        none: "<gray> Предметы не заданы."
      unlock_level:
        name: "<white><bold> Уровень"
        description: |-
          <gray> Позволяет изменять требуемый
          <gray> уровень острова
          <gray> для разблокировки этого биома.
        value: "<gray> Текущий уровень: <yellow> [number]"
      change_cost:
        name: "<white><bold> Стоимость"
        description: |-
          <gray> Позволяет изменять стоимость
          <gray> применения этого биома.
        value: "<gray> Текущая стоимость: <yellow> [number]"
      change_items:
        name: "<white><bold> Предметы"
        description: |-
          <gray> Позволяет изменять предметы
          <gray> для применения этого биома.
        title: "<yellow> Предметы: "
        element: " <dark_gray> - [number]x[item]"
        none: "<gray> Предметы не заданы."
      change_type:
        name: "<white><bold> [type]"
        description: |-
          <gray> Позволяет изменять тип стоимости
          <gray> для применения этого биома.
        static:
          name: "Статическое Значение"
          description: |-
            <gray> Стоимость изменения биома не
            <gray> изменяется.
        per_block:
          name: "За Блок"
          description: |-
            <gray> Стоимость изменения биома
            <gray> рассчитывается за блок.
        per_usage:
          name: "За Использование"
          description: |-
            <gray> Стоимость изменения биома
            <gray> увеличивается после каждого
            <gray> использования.
        enabled: "<dark_green>"
        disabled: "<red>"
      change_increment:
        name: "<white><bold> Приращение"
        description: |-
          <gray> Позволяет изменять
          <gray> приращение за использование.
        value: "<gray> Текущее значение: <yellow> [number]"
      biome-filter:
        name: "<white><bold> [filter]"
        description: |-
          <gray> Фильтр Биома на основе
          <gray> Вики Minecraft.
        lush: "Пышные Биомы"
        dry: "Засушливые Биомы"
        cold: "Холодные Биомы"
        snowy: "Снежные Биомы"
        aquatic: "Океанские Биомы"
        nether: "Биомы Нижнего Мира"
        the_end: "Биомы The End"
        neutral: "Нейтральные Биомы"
        unused: "Неиспользуемые Биомы"
        warm: "Теплые Биомы"
        cave: "Пещерные Биомы"
        temperate: "Умеренные Биомы"
      protection_range:
        name: "<white><bold> Диапазон Защиты"
        description: |-
          <gray> Позволяет ограничить изменение
          <gray> биома только диапазоном защиты
          <gray> острова вместо изменения биома
          <gray> на всем острове.
        enabled: "<dark_green> Включено"
        disabled: "<red> Отключено"
      reset:
        name: "<white><bold> Сброс При Смене Владельца"
        description: |-
          <gray> Позволяет включить принудительное
          <gray> изменение биома на используемый по умолчанию,
          <gray> если остров меняет владельца и новый
          <gray> владелец не имеет разрешения
          <gray> для текущего биома.
        enabled: "<dark_green> Включено"
        disabled: "<red> Отключено"
      cool_down:
        name: "<white><bold> Перезарядка Биома"
        description: |-
          <gray> Позволяет установить количество
          <gray> секунд между изменениями
          <gray> биома игроком.
        value: "<gray> Текущая перезарядка: <yellow> [number]"
        disabled: "<yellow> Перезарядка отключена."
      default_size:
        name: "<white><bold> Диапазон По Умолчанию"
        description: |-
          <gray> Позволяет установить число,
          <gray> которое будет использоваться, когда
          <gray> игрок изменяет биом без
          <gray> его указания.
        value: "<gray> Диапазон По Умолчанию: <yellow> [number]"
      default_mode:
        name: "<white><bold> Режим Обновления По Умолчанию"
        description: |-
          <gray> Позволяет установить режим обновления
          <gray> по умолчанию, когда игроки его
          <gray> не указали.
        enabled: "<dark_green>"
        disabled: "<red>"
      unlock_notify:
        name: "<white><bold> Уведомление При Разблокировке"
        description: |-
          <gray> Сообщение будет отправлено
          <gray> пользователю при разблокировке
          <gray> нового биома.
        enabled: |-
          <aqua> Уведомление при разблокировке <green> включено <aqua>.
        disabled: |-
          <aqua> Уведомление при разблокировке <red> отключено <aqua>.
      change_timeout:
        name: "<white><bold> Тайм-Аут Для Изменения"
        description: |-
          <gray> Позволяет установить, через сколько
          <gray> минут обновление биома будет
          <gray> остановлено.
          <gray> Может случиться на очень больших
          <gray> островах или серверах под
          <gray> огромной нагрузкой.
        value: "<gray> Тайм-аут через: <yellow> [number] мин"
      parallel_updates:
        name: "<white><bold> Параллельные Обновления"
        description: |-
          <gray> Позволяет установить, сколько
          <gray> обновлений биома могут происходить
          <gray> одновременно.
          <gray> Остальные будут помещены в
          <gray> очередь.
        value: |-
          <gray> Текущее значение: <yellow>[number]<gray>.
      use_bank:
        name: "<white><bold> Использовать Банковский Счет"
        description: |-
          <gray> Переключает использование всеми
          <gray> платежами дополнения Biomes
          <gray> банковского счета острова из
          <gray> дополнения Bank.
        enabled: |-
          <aqua> Использование банковского счета <green> включено <aqua>.
        disabled: |-
          <aqua> Использование банковского счета <red> отключено <aqua>.
        missing: |-
          <red> Дополнение Bank не установлено.
      visibility:
        name: "<white><bold> Видимость Биома"
        description: |-
          <gray> Позволяет изменять видимость
          <gray> биома игрока на панелях выбора
          <gray> биома.
        enabled: "<dark_green>"
        disabled: "<red>"
        all: "Все Биомы"
        deployed: "Развернутые Биомы"
        accessible: "Доступные Биомы"
        toggleable: "Переключаемые"
      is_online:
        name: "<white><bold> Острова С Игроками В Сети"
        description: |-
          <gray> Список всех островов, где
          <gray> любой участник онлайн.
      all_islands:
        name: "<white><bold> Все Острова"
        description: |-
          <gray> Список всех островов,
          <gray> которые созданы в
          <gray> текущем режиме игры.
      island_name:
        name: "<white><bold> [name]"
        island-owner: "[player]"
        unknown: "<red> Неизвестный Владелец"
        description: |-
          [owner]
          [members]
          [id]
        owner: "<gray> Владелец: <yellow> [player]"
        title: "<gray> Члены Острова:"
        element: " <gray> - <yellow> [player]"
      change_biome:
        name: "<white><bold> Изменить Биом"
        description: |-
          <gray> Изменить биом на острове.
      manage_data:
        name: "<white><bold> Управление Данными Острова"
        description: |-
          <gray> Управлять данными, которые
          <gray> хранятся для конкретного острова.
      clear_data:
        name: "<white><bold> Очистить Данные Острова"
        description: |-
          <gray> Очистить все сохраненные
          <gray> данные острова.
      island_bundle:
        name: "<white><bold> Набор Острова"
        description: |-
          <gray> Набор, который назначен
          <gray> текущему острову.
          <gray> Только биомы из этого
          <gray> набора могут быть использованы на острове.
        value: "<aqua> Набор: [bundle]"
        overwritten: |-
          <red> Владелец имеет разрешение,
          <red> которое переопределяет набор.
      owner_bundle:
        name: "<white><bold> Набор Владельца"
        description: |-
          <gray> Набор, который назначен
          <gray> владельцу текущего острова.
          <gray> Только биомы из этого
          <gray> набора могут быть использованы на острове.
          <gray> Разрешение для пользователя для назначения:
          <gray><italic> '[gamemode].biomes.
          <gray><italic> bundle.<bundle-id>'
        value: "<aqua> Набор: [bundle]"
      reset_to_default:
        name: "<white><bold> Сброс На Значения По Умолчанию"
        description: |-
          <gray> Сбросить все значения
          <gray> острова на значения по умолчанию
          <gray> из параметров.
      bundle_info:
        name: "<white><bold> Основная Информация"
        description: |-
          <gray> Просмотреть основную
          <gray> информацию набора.
      bundle_biomes:
        name: "<white><bold> Управление Биомами"
        description: |-
          <gray> Управлять биомами, которые
          <gray> назначены набору.
      bundle_name:
        name: "<white><bold> Изменить Имя"
        description: |-
          <gray> Изменить отображаемое
          <gray> имя набора.
        value: "<yellow> Текущее Значение: <reset> [bundle]"
      bundle_icon:
        name: "<white><bold> Изменить Иконку"
        description: |-
          <gray> Изменить иконку набора.
      bundle_description:
        name: "<white><bold> Изменить Описание"
        description: |-
          <gray> Изменить описание набора.
        value: "<yellow> Текущее значение:"
        none: "<red> Нет описания"
      bundle_permission:
        name: "<white><bold> Разрешение Набора"
        description: |-
          <gray> Разрешение, которое должно быть
          <gray> добавлено пользователю для
          <gray> принудительного использования этого набора.
        value: "<yellow> Разрешение: <white> [gamemode].biomes.bundle.[id]"
      add_bundle_biome:
        name: "<white><bold> Добавить Биом"
        description: |-
          <gray> Назначить биом
          <gray> этому набору.
        title: "<aqua> Выбранные Биомы:"
        value: "<aqua> - [biome]"
      remove_bundle_biome:
        name: "<white><bold> Удалить Биом"

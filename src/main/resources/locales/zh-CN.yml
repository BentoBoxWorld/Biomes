      edit-bundle: "<black><bold>编辑捆绑包: [bundle]"
      edit-island: "<black><bold>编辑岛屿: [island]"
      environment-selector: "<black><bold>选择生效维度"
      biome-selector: "<black><bold>选择生物群系"
      bundle-selector: "<black><bold>选择捆绑包"
      item-selector: "<black><bold>选择物品"
    buttons:

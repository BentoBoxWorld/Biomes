---
biomes:
  commands:
    admin:
      main:
        description: 主要生物群系管理员命令
      import:
        parameters: "<file>"
        description: 导入biomes.yml文件中的生物群系设置
        confirmation: 这将从[gamemode]中移除现有的生物群系并从模板文件中导入新的生物群系 - 请确认
      migrate:
        description: 将原生物群系相关数据转为新格式
      set:
        description: 更改玩家<player>的岛屿生物群系, [type]和[size]可以选择不输入
        parameters: "<player> <biome-id> [mode] [size]"
      unlock:
        description: 无需检查即可为玩家解锁生物群系, 末尾添加`true`会将其标记为已购买
        parameters: "<player> <biome-id> [true]"
      clear-queue:
        description: 清除生物群系更新队列
    player:
      main:
        description: 打开生物群系选择GUI
      set:
        description: 更改玩家的生物群系
        parameters: "<biome-id> [mode] [size]"
      buy:
        description: 购买需要的生物群系
        parameters: "<biome-id>"
      info:
        description: 在聊天信息中发送生物群系的详细描述
        parameters: "<biome-id>"
  gui:
    titles:
      player-panel: "<black><bold>选择生物群系"

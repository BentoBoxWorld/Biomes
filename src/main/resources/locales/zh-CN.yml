        description: "<gray>更改整个岛屿的生物群系"
      chunk:
        name: "<white><bold>区块"
        description: "<gray>按区块更改生物群系"
      range:
        name: "<white><bold>范围"
        description: "<gray>按范围更改生物群系"
      reduce:
        name: "<white><bold>减少"
        description: "<gray>减少<yellow>[number]"
      increase:
        name: "<white><bold>增加"
        description: "<gray>增加<yellow>[number]"
      accept:

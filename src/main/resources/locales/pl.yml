      export_from_database:
        name: "<white><bold> Eksportuj bazę danych"
        description: |-
          <gray> Eksportuj bazę danych
          <gray> do jednego pliku znajdującego się w
          <gray> katalog dodatków.
      import_to_database:
        name: "<white><bold> Importuj bazę danych"
        description: |-
          <gray> Importuj bazę danych z
          <gray> plik znajdujący się w dodatku
          Katalog <gray>.
      wipe_islands_data:
        name: "<white><bold> Wyczyść bazę danych wysp"
        description: |-
          <gray> Wyczyść wszystkie dane użytkownika biomów
          <gray> dla tego trybu gry.
      wipe_biomes_data:
        name: "<white><bold> Wyczyść bazę danych biomów"
        description: |-
          <gray> Wyczyść wszystkie biomy i pakiety
          <gray> danych dla tego trybu gry.
      add_biome:
        name: "<white><bold> Dodaj biom"
        description: |-
          <gray> Tworzy nowy biom, który
          <gray> gracz może użyć za pomocą
          <gray> paneli użytkownika.
      remove_biome:
        name: "<white><bold> Usuń biom"
        description: |-
          <gray> Usuwa wybrane biomy
          <gray> z paneli użytkownika.
        title: "<yellow> Wybrane biomy:"
        value: "<yellow> - [biome]"
      accept_selected:
        name: "<white><bold> Akceptuj zaznaczone"
        description: "<gray> Akceptuje wybrane elementy."
        title: "<yellow> Wybrane elementy:"
        element: "<yellow> - [element]"
      environment_element:
        name: "<white><bold> [environment]"
        description: "<gray> [description]."
      properties:
        name: "<white><bold> Właściwości"
        description: "<gray> Wyświetl główne właściwości biomu."
      change_properties:
        name: "<white><bold> Zmień właściwości"
        description: "<gray> Zobacz zmieniające się właściwości biomu."
      unlock_properties:
        name: "<white><bold> Odblokuj właściwości"
        description: "<gray> Wyświetl właściwości odblokowania biomu."
      biome:
        name: "<white><bold> [biome]"
        description: "<gray> Typ biomu Minecrafta."
        value: "<gray> Identyfikator biomu: <yellow> [id]"
      name:
        name: "<white><bold> Wyświetlana nazwa"
        description: |-
          <gray> Wyświetlana nazwa biomu.
          <gray> Obsługuje kody kolorów.
        value: "<gray> Bieżąca wartość: <reset> [name]"
      deployed:
        name: "<white><bold> Wdrożono"
        description: |-
          <gray> Przełącza, jeśli biom to
          <gray> dostępne dla graczy
          <gray> czy nie.
        enabled: "<dark_green> Włączone"
        disabled: "<red> Wyłączone"
      environment:
        name: "<white><bold> Wymiar"
        description: |-
          <gray> Pozwala ograniczyć, w których
          <gray> zwymiaruj biom
          <gray> można zastosować.
        enabled: "<dark_green>"
        disabled: "<red>"
      icon:
        name: "<white><bold> Ikona"
        description: |-
          <gray> Pozwala zmienić ikonę
          <gray> dla tego biomu.
      order:
        name: "<white><bold> Kolejność"
        description: |-
          <gray> Pozwala zmienić kolejność
          <gray> obiektów.
          <gray> Obiekty o równych numerach
          <gray> zostaną ułożone alfabetycznie
        value: "<gray> Bieżąca kolejność: <yellow> [number]"
      description:
        name: "<white><bold> Opis"
        description: |-
          <gray> Szczegółowy opis
          <gray> dla biomu. Kolor
          Należy do niego zastosować kody <gray>.
        value: "<yellow> Bieżący opis:"
        none: "<gray> Opis nie jest ustawiony."
      unlock_permissions:
        name: "<white><bold> Uprawnienia"
        description: |-
          <gray> Pozwala na zmianę odblokowania
          <gray> uprawnień do tego
          <gray> biom, aby był dostępny.
        title: "<yellow> Uprawnienia:"
        element: " <dark_gray> - [permission]"
        none: "<gray> Uprawnienia nie są ustawione."
      unlock_cost:
        name: "<white><bold> Koszt"
        description: |-
          <gray> Pozwala zmienić koszt
          <gray> odblokowanie tego biomu.
        value: "<gray> Bieżący koszt: <yellow> $[number]"
      unlock_items:
        name: "<white><bold> Przedmioty"
        description: |-
          <gray> Pozwala na zmianę odblokowania
          <gray> elementów dla tego biomu.
        title: "<yellow> Przedmioty:"
        element: " <dark_gray> - [number]x[item]"
        none: "<gray> Pozycje nie są ustawione."
      unlock_level:
        name: "<white><bold> Poziom"
        description: |-
          <gray> Pozwala na zmianę
          <gray> wymagany poziom wyspy
          <gray> za odblokowanie tego biomu.
        value: "<gray> Bieżący poziom: <yellow> [number]"
      change_cost:
        name: "<white><bold> Koszt"
        description: |-
          <gray> Pozwala zmienić koszt
          <gray> zastosowanie tego biomu.
        value: "<gray> Bieżący koszt: <yellow> $[number]"
      change_items:
        name: "<white><bold> Przedmioty"
        description: |-
          <gray> Pozwala na zmianę elementów
          <gray> za zastosowanie tego biomu.
        title: "<yellow> Przedmioty:"
        element: " <dark_gray> - [number]x[item]"
        none: "<gray> Pozycje nie są ustawione."
      change_type:
        name: "<white><bold> [type]"
        description: |-
          <gray> Pozwala zmienić rodzaj kosztu
          <gray> za zastosowanie tego biomu.
        static:
          name: Wartość stała
          description: |-
            <gray> Koszt zmiany biomu
            <gray> jest niezmienny.
        per_block:
          name: Za blok
          description: "<gray> Koszt zmiany biomu \n<gray> jest obliczany za każdy blok"
        per_usage:
          name: Na użycie
          description: "<gray> Koszt zmiany biomu \n<gray> wzrasta po każdej\n<gray> zmianie."
        enabled: "<dark_green>"
        disabled: "<red>"
      change_increment:
        name: "<white><bold> Przyrost"
        description: |-
          <gray> Pozwala na zmianę
          <gray> przyrost na użycie.
        value: "<gray> Aktualna wartość: <yellow> [number]"

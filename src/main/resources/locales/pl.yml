          <gray> Wiadomość zostanie wysłana
          <gray> do użytkownika, gdy odblokuje
          <gray> nowy biom.
        enabled: "<aqua> Powiadamianie o odblokowaniu jest <green> włączone <aqua>."
        disabled: "<aqua> Powiadamianie o odblokowaniu jest <red> wyłączone <aqua>."

---
biomes:
  commands:
    admin:
      main:
        description: główne polecenie administracji biomami
      import:
        parameters: "<plik>"
        description: importuje biomy
        confirmation: Spowoduje to usunięcie istniejących biomów z [gamemode] i zaimportowanie
          nowych biomów z pliku szablonu - proszę potwierdzić
      migrate:
        description: migruje dane zapisane w biomach do nowego formatu
      set:
        description: zmienia biom dla gracza
        parameters: "<gracz> <identyfikator-biomu> [tryb] [rozmiar]"
      unlock:
        description: odblokowuje biom dla gracza bez kontroli. Dodanie `true` na końcu
          spowoduje oznaczenie go jako zakupione.
        parameters: "<player> <biome-id> [true]"
    player:
      main:
        description: otwiera GUI wyboru biomów
      set:
        description: zmienia biom dla gracza
        parameters: "<biome-id> [mode] [wielość]"
      buy:
        description: kupuje żądany biom
        parameters: "<biome-id>"
      info:
        description: wysyła wiadomość na czacie ze szczegółowym opisem biomu
        parameters: "<biom-id>"
  gui:
    titles:
      player-panel: "<black><bold> Wybierz biom"
      buy-panel: "<black><bold> Kup biom"
      advanced-panel: "<black> Tryb aktualizacji"
      admin-panel: "<black><bold> GUI administratora"
      settings: "<italic><bold> ustawienia"
      library: "<black><bold> Biblioteka"
      manage-biomes: "<black><bold> Zarządzaj biomami"
      manage-bundles: "<black><bold> Zarządzaj pakietami"
      manage-islands: "<black><bold> Zarządzaj danymi wysp"
      edit-biome: "<black><bold> Edytuj biom: [biome]"
      edit-bundle: "<black><bold> Edytuj pakiet: [bundle]"
      edit-island: "<black><bold> Edytuj wyspę: [island]"
      environment-selector: "<black><bold> Wybierz środowisko"
      biome-selector: "<black><bold> Wybierz biom"
      bundle-selector: "<black><bold> Wybierz pakiet"
      item-selector: "<black><bold> Wybierz elementy"
    buttons:
      island:
        name: "<white><bold> Wyspa"
        description: |-
          <gray> Zmienia biom na całej
          <gray> wyspie.
      chunk:
        name: "<white><bold> Chunk"
        description: "<gray> Zmienia biom w chunkach."
      range:
        name: "<white><bold> Zakres"
        description: "<gray> Zmienia biom według zasięgu."
      reduce:
        name: "<white><bold> Zmniejsz"
        description: "<gray> Zmniejsz o <yellow> [number]"
      increase:
        name: "<white><bold> Zwiększ"
        description: "<gray> Zwiększ o <yellow> [number]"
      accept:
        name: "<white><bold> Zastosuj zmiany"
        description: |-
          <gray> Zmienia biom na <yellow> [biome]

          <gray> Tryb aktualizacji: <yellow> [mode]
          <gray> Zakres aktualizacji: <yellow> [number]
      return:
        name: "<white><bold> Powrót"
        description: "<gray> Powrót do poprzedniego menu."
      previous:
        name: "<white><bold> Poprzednia strona"
        description: "<gray> Przełącz na <yellow> [number] <gray> stronę"
      next:
        name: "<white><bold> Następna strona"
        description: "<gray> Przełącz na <yellow> [number] <gray> stronę"
      quit:
        name: "<white><bold> Zakończ"
        description: "<gray> Wyjdź z GUI."
      save:
        name: "<white><bold> Zapisz"
        description: "<gray> Zapisz zmiany i wróć."
      cancel:
        name: "<white><bold> Anuluj"
        description: "<gray> Anuluj zmiany i wróć."
      search:
        name: "<white><bold> Szukaj"
        description: "<gray> Umożliwia wyszukiwanie \n<gray> elementów za pomocą\n<gray> wartości
          tekstowej."
        search: "<aqua> Wartość: [value]"
      buy:
        name: "<white><bold> Zakup"
        description: "<gray> Kup nowy biom."
      manage_islands:
        name: "<white><bold> Zarządzaj wyspami"
        description: "<gray> Pozwala zarządzać danymi wyspy."
      manage_biomes:
        name: "<white><bold> Zarządzaj biomami"
        description: "<gray> Pozwala zarządzać danymi \n biomów."
      manage_bundles:
        name: "<white><bold> Zarządzaj pakietami"
        description: |-
          <gray> Pozwala zarządzać pakietami
          <gray> dane.
      settings:
        name: "<white><bold> Ustawienia"
        description: |-
          <gray> Pozwala zmienić niektóre
          <gray> ustawienia dodatków.
      import_template:
        name: "<white><bold> Importuj szablon"
        description: |-
          <gray> Importuj szablon
          <gray> plik znajduje się wewnątrz
          <gray> katalogu dodatków.
      web_library:
        name: "<white><bold> Biblioteka internetowa"
        description: "<gray> Uzyskaj dostęp do \n<gray> biblioteki zawierającej\n<gray> udostępnione

        name: "<white><bold> [filter]"
        description: |-
          <gray> Oparty na filtrze biomu
          <gray> na Minecraft Wiki.
        lush: Bujne biomy
        dry: Suche biomy
        cold: Zimne Biomy
        snowy: Śnieżne biomy
        ocean: Biomy oceaniczne
        nether: Netherowe biomy
        the_end: Biomy końca
        neutral: Neutralne biomy
        unused: Niewykorzystane biomy
      protection_range:
        name: "<white><bold> Zakres ochrony"
        description: "<gray> Pozwala ograniczyć zmianę \n<gray> biomu tylko do zakresu \n<gray>

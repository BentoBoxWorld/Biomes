      clear-queue:
        description: "biyom güncelleme kuyruğunu temizler"
    # Bu bölüm yalnızca oyuncu komutları çevirilerini içerir.
    player:
      main:
        description: "biyom seçim arayüzünü açar"
      set:
        description: "oyuncu için biyomu değiştirir"
        parameters: "<biome-id> [mode] [size]"
      buy:
        description: "istenen biyomu satın alır"
        parameters: "<biome-id>"
      info:
        description: "sohbete ayrıntılı biyom açıklaması içeren bir mesaj gönderir"
        parameters: "<biome-id>"

    # Bu bölüm yalnızca yönetici komutları çevirilerini içerir.
    admin:
      main:
        description: "ana biyom yönetici komutu"
      import:
        parameters: "<file>"
        description: "biyomları içe aktarır"
        confirmation: "Bu işlem [gamemode] adresindeki mevcut biyomları kaldıracak ve şablon dosyasından yeni biyomları içe aktaracaktır - lütfen onaylayın"
